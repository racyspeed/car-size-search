<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>車両サイズ検索</title>
</head>
<body>

<h2>車両サイズ検索（Supabase版）</h2>

<select id="carSelect">
  <option>読込中...</option>
</select>

<div id="result"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://klfijtvnbgdkqcslntsp.supabase.co";
const supabaseKey = "sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";

const supabase = createClient(supabaseUrl, supabaseKey);

const select = document.getElementById("carSelect");
const result = document.getElementById("result");

const { data, error } = await supabase
  .from("cars")
  .select("*")
  .order("maker");

if (error) {
  select.innerHTML = "<option>読込エラー</option>";
  console.error(error);
} else {
  select.innerHTML = '<option value="">車種を選択</option>';

  data.forEach(car => {
    const option = document.createElement("option");
    option.value = car.model;
    option.textContent = `${car.maker} ${car.model}`;
    option.dataset.size = car.size;
    select.appendChild(option);
  });
}

select.addEventListener("change", function() {
  const option = this.selectedOptions[0];

  if (!option.value) {
    result.innerHTML = "";
    return;
  }

  const size = option.dataset.size;

result.innerHTML = `
  <h3>あなたの車</h3>
  ${option.textContent}
  <br><br>
  ${size}サイズ

  <br><br>

  <select id="menuSelect">
    <option value="">メニューを選択</option>
  </select>

  <div id="priceResult"></div>
`;

loadMenus(size);
});
  async function loadMenus(size) {

  const menuSelect = document.getElementById("menuSelect");

  const { data: menus } = await supabase
    .from("menus")
    .select("*");

  menus.forEach(menu => {
    const option = document.createElement("option");
    option.value = menu.menu_name;
    option.textContent = menu.menu_name;
    menuSelect.appendChild(option);
  });

  menuSelect.addEventListener("change", async function() {

    const menuName = this.value;

    if (!menuName) return;

    const { data: prices } = await supabase
      .from("prices")
      .select("*")
      .eq("menu_name", menuName)
      .eq("size", size);

    if (!prices.length) {
      document.getElementById("priceResult").innerHTML =
        "<br>料金未設定";
      return;
    }

    const { data: menuData } = await supabase
  .from("menus")
  .select("*")
  .eq("menu_name", menuName);

document.getElementById("priceResult").innerHTML = `
  <br><br>
  <strong>${prices[0].price.toLocaleString()}円（税込）</strong>

  <br><br>

  施工時間：${menuData[0].work_time}
`;
  });

}
</script>

</body>
</html>
