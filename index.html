<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://klfijtvnbgdkqcslntsp.supabase.co";
const supabaseKey = "sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";
const lineUrl = "https://lin.ee/2ESfOqD";
const caseUrl = "#";

const supabase = createClient(supabaseUrl, supabaseKey);

const makerSelect = document.getElementById("makerSelect");
const select = document.getElementById("carSelect");
const result = document.getElementById("result");
const carSearch = document.getElementById("carSearch");
const searchResults = document.getElementById("searchResults");

const JAPANESE_MAKERS = [
  "トヨタ","レクサス","ホンダ","日産","マツダ","スバル","スズキ","ダイハツ","三菱"
];

const IMPORT_MAKERS = [
  "BMW","MINI","メルセデス・ベンツ","アウディ","フォルクスワーゲン","ポルシェ","ボルボ","ジープ","プジョー","ルノー","ランドローバー","ジャガー","マセラティ","アルファロメオ","フィアット","シトロエン","DS","BYD","テスラ","シボレー","キャデラック","フォード","リンカーン","ダッジ","クライスラー","ハマー","ベントレー","ロールスロイス","フェラーリ","ランボルギーニ","アストンマーティン","マクラーレン","アバルト","ロータス","ヒョンデ","KIA"
];

const { data, error } = await supabase
  .from("cars")
  .select("*")
  .order("maker");

if (error) {
  select.innerHTML = '<option>読込エラー</option>';
  console.error(error);
} else {
  const cars = data;

  function formatMenuName(name) {
    return String(name)
      .replaceAll("2層研磨", "2周研磨")
      .replaceAll("MIYABI+ISM", "MIYABI＋ISM")
      .replaceAll("MIYABI+IZM", "MIYABI＋IZM")
      .replaceAll("MIYABI+OVER COAT", "MIYABI＋OVER COAT");
  }

  function getBrandType(menuName) {
    if (menuName.includes("ISM")) return "ism";
    if (menuName.includes("IZM")) return "izm";
    if (menuName.includes("OVER COAT")) return "over";
    return "other";
  }

  function getBrandInfo(type) {
    if (type === "ism") {
      return {
        sub:"MIYABI＋",
        main:"ISM",
        coat:"COAT",
        desc:"深い艶と優れた撥水性を両立したハイグレードコーティング",
        className:"brand-ism"
      };
    }

    if (type === "izm") {
      return {
        sub:"MIYABI＋",
        main:"IZM",
        coat:"COAT",
        desc:"圧倒的な艶と強靭な被膜で愛車を守るプレミアムコーティング",
        className:"brand-izm"
      };
    }

    return {
      sub:"MIYABI＋",
      main:"OVER COAT",
      coat:"SEALANT",
      desc:"コーティング被膜を保護し、美しさを長く維持するためのシーラントコーティング",
      className:"brand-over"
    };
  }

  function getPlanLabel(menuName) {
    const name = formatMenuName(menuName);
    if (name.includes("研磨なし")) return "研磨なし";
    if (name.includes("軽研磨")) return "軽研磨";
    if (name.includes("2周研磨")) return "2周研磨";
    return "プラン";
  }

  function getPlanDescription(menuName) {
    const label = getPlanLabel(menuName);

    if (label === "研磨なし") return "新車や状態の良いお車におすすめ。";
    if (label === "軽研磨") return "軽い雨染みや小キズが気になるお車におすすめ。";
    if (label === "2周研磨") return "艶をしっかり出したい方におすすめ。";

    return "お車の状態に合わせて施工いたします。";
  }

  function toKatakana(str) {
    return str.replace(/[ぁ-ん]/g, char =>
      String.fromCharCode(char.charCodeAt(0) + 0x60)
    );
  }

  function toHalfWidth(str) {
    return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, char =>
      String.fromCharCode(char.charCodeAt(0) - 0xFEE0)
    );
  }

  function normalizeText(str) {
    return toHalfWidth(toKatakana(String(str)))
      .toLowerCase()
      .replace(/[・\s　\-\_\.\/／]/g, "")
      .replace(/[（）\(\)]/g, "");
  }

  function getAliasWords(car) {
    const words = [];

    if (car.maker === "メルセデス・ベンツ") {
      words.push("ベンツ","benz","mercedes","mercedesbenz","mb");
    }

    if (car.maker === "フォルクスワーゲン") {
      words.push("vw","volkswagen","ワーゲン");
    }

    if (car.maker === "レクサス") words.push("lexus");
    if (car.maker === "トヨタ") words.push("toyota");
    if (car.maker === "ホンダ") words.push("honda");
    if (car.maker === "日産") words.push("nissan");
    if (car.maker === "マツダ") words.push("mazda");
    if (car.maker === "スバル") words.push("subaru");
    if (car.maker === "スズキ") words.push("suzuki");
    if (car.maker === "ダイハツ") words.push("daihatsu");
    if (car.maker === "三菱") words.push("mitsubishi");
    if (car.maker === "テスラ") words.push("tesla");
    if (car.maker === "ポルシェ") words.push("porsche");
    if (car.maker === "アウディ") words.push("audi");
    if (car.maker === "ボルボ") words.push("volvo");
    if (car.maker === "ジープ") words.push("jeep");
    if (car.maker === "ランドローバー") words.push("landrover","rangerover");

    if (car.model === "プリウス") words.push("prius");
    if (car.model === "アルファード") words.push("alphard","アル");
    if (car.model === "ヴェルファイア") words.push("vellfire");
    if (car.model === "ハイエース") words.push("hiace");
    if (car.model === "ランドクルーザー250" || car.model === "ランドクルーザー300") {
      words.push("ランクル","landcruiser");
    }

    return words;
  }

  function getSearchText(car) {
    return normalizeText([
      car.maker,
      car.model,
      `${car.maker}${car.model}`,
      ...getAliasWords(car)
    ].join(" "));
  }

  function getSearchScore(car, keyword) {
    const maker = normalizeText(car.maker);
    const model = normalizeText(car.model);
    const makerModel = normalizeText(`${car.maker}${car.model}`);
    const searchText = getSearchText(car);

    if (model === keyword) return 100;
    if (makerModel === keyword) return 95;
    if (model.startsWith(keyword)) return 90;
    if (makerModel.startsWith(keyword)) return 85;
    if (maker.startsWith(keyword)) return 80;
    if (searchText.includes(keyword)) return 60;

    return 0;
  }

  function getMakerSortIndex(maker) {
    if (JAPANESE_MAKERS.includes(maker)) return JAPANESE_MAKERS.indexOf(maker);
    if (IMPORT_MAKERS.includes(maker)) return 100 + IMPORT_MAKERS.indexOf(maker);
    return 999;
  }

  function addMakerOptions() {
    const makers = [...new Set(cars.map(car => car.maker))]
      .sort((a,b) => {
        const diff = getMakerSortIndex(a) - getMakerSortIndex(b);
        if (diff !== 0) return diff;
        return a.localeCompare(b,"ja");
      });

    makerSelect.innerHTML = '<option value="">メーカーを選択</option>';

    const japaneseGroup = document.createElement("optgroup");
    japaneseGroup.label = "日本車";

    const importGroup = document.createElement("optgroup");
    importGroup.label = "輸入車";

    const otherGroup = document.createElement("optgroup");
    otherGroup.label = "その他";

    makers.forEach(maker => {
      const option = document.createElement("option");
      option.value = maker;
      option.textContent = maker;

      if (JAPANESE_MAKERS.includes(maker)) {
        japaneseGroup.appendChild(option);
      } else if (IMPORT_MAKERS.includes(maker)) {
        importGroup.appendChild(option);
      } else {
        otherGroup.appendChild(option);
      }
    });

    makerSelect.appendChild(japaneseGroup);
    makerSelect.appendChild(importGroup);

    if (otherGroup.children.length) {
      makerSelect.appendChild(otherGroup);
    }
  }

  addMakerOptions();

  function populateCarsByMaker(maker) {
    select.innerHTML = '<option value="">車種を選択</option>';

    cars
      .filter(car => car.maker === maker)
      .sort((a,b) => a.model.localeCompare(b.model,"ja"))
      .forEach(car => {
        const option = document.createElement("option");
        option.value = car.model;
        option.textContent = car.model;
        option.dataset.size = car.size;
        option.dataset.maker = car.maker;
        select.appendChild(option);
      });
  }

  function showCar(car) {
    carSearch.value = `${car.maker} ${car.model}`;
    searchResults.innerHTML = "";
    searchResults.style.display = "none";

    makerSelect.value = car.maker;
    populateCarsByMaker(car.maker);
    select.value = car.model;

    result.innerHTML = `
      <div class="selected-car-card">
        <div class="selected-car-label">お選びのお車</div>
        <div class="car-name">${car.maker} ${car.model}</div>
        <div class="car-size">${car.size}サイズ</div>
      </div>

      <div class="category-area">
        <div class="category-label">施工カテゴリ</div>
        <select id="categorySelect">
          <option value="">選択してください</option>
          <option value="wash">洗車</option>
          <option value="coating">コーティング</option>
        </select>
      </div>

      <div class="wash-menu-area" id="washMenuArea">
        <select id="menuSelect">
          <option value="">メニューを選択</option>
        </select>
      </div>

      <div id="coatingArea" class="coating-area"></div>

      <div id="optionArea"></div>
      <div id="priceResult"></div>
    `;

    loadMenus(car.size);
  }

  document.querySelectorAll(".quick-car-button").forEach(button => {
    button.addEventListener("click", function() {
      const car = cars.find(item =>
        item.maker === this.dataset.maker &&
        item.model === this.dataset.model
      );

      if (car) showCar(car);
    });
  });

  makerSelect.addEventListener("change", function() {
    populateCarsByMaker(this.value);
    result.innerHTML = "";
    carSearch.value = "";
    searchResults.innerHTML = "";
    searchResults.style.display = "none";
  });

  select.addEventListener("change", function() {
    const option = this.selectedOptions[0];

    if (!option.value) {
      result.innerHTML = "";
      return;
    }

    const car = cars.find(item =>
      item.maker === option.dataset.maker &&
      item.model === option.value
    );

    if (car) showCar(car);
  });

  carSearch.addEventListener("input", function() {
    const rawKeyword = this.value.trim();
    const keyword = normalizeText(rawKeyword);

    searchResults.innerHTML = "";

    if (!keyword) {
      searchResults.style.display = "none";
      return;
    }

    const keywords = rawKeyword
      .split(/\s+/)
      .map(word => normalizeText(word))
      .filter(Boolean);

    const effectiveKeywords = keywords.length ? keywords : [keyword];

    const matchedCars = cars
      .map(car => {
        const searchText = getSearchText(car);

        const isMatch =
          effectiveKeywords.every(word => searchText.includes(word)) ||
          searchText.includes(keyword);

        if (!isMatch) return null;

        const score = Math.max(
          getSearchScore(car, keyword),
          ...effectiveKeywords.map(word => getSearchScore(car, word))
        );

        return { car, score };
      })
      .filter(Boolean)
      .sort((a,b) => {
        if (b.score !== a.score) return b.score - a.score;
        return `${a.car.maker}${a.car.model}`.localeCompare(`${b.car.maker}${b.car.model}`,"ja");
      })
      .slice(0,20)
      .map(item => item.car);

    if (!matchedCars.length) {
      searchResults.innerHTML =
        '<div class="search-result-item">該当する車種がありません</div>';
      searchResults.style.display = "block";
      return;
    }

    matchedCars.forEach(car => {
      const item = document.createElement("div");
      item.className = "search-result-item";
      item.textContent = `${car.maker} ${car.model}／${car.size}サイズ`;
      item.addEventListener("click", function() {
        showCar(car);
      });
      searchResults.appendChild(item);
    });

    searchResults.style.display = "block";
  });

  async function loadMenus(size) {
    const categorySelect = document.getElementById("categorySelect");
    const washMenuArea = document.getElementById("washMenuArea");
    const menuSelect = document.getElementById("menuSelect");
    const coatingArea = document.getElementById("coatingArea");

    const { data: menus } = await supabase
      .from("menus")
      .select("*");

    const { data: sizePrices } = await supabase
      .from("prices")
      .select("*")
      .eq("size", size);

    menus.sort((a,b) => {
      const order = {
        "純水手洗い洗車":1,
        "徹底洗車":2,
        "徹底洗車ライト":3,
        "MIYABI+ISM（研磨なし）":4,
        "MIYABI+ISM（軽研磨）":5,
        "MIYABI+ISM（2層研磨）":6,
        "MIYABI+IZM（研磨なし）":7,
        "MIYABI+IZM（軽研磨）":8,
        "MIYABI+IZM（2層研磨）":9,
        "MIYABI+OVER COAT（研磨なし）":10,
        "MIYABI+OVER COAT（軽研磨）":11,
        "MIYABI+OVER COAT（2層研磨）":12
      };

      return (order[a.menu_name] || 999) - (order[b.menu_name] || 999);
    });

    categorySelect.addEventListener("change", function() {
      menuSelect.innerHTML = '<option value="">メニューを選択</option>';
      coatingArea.innerHTML = "";
      coatingArea.style.display = "none";
      washMenuArea.style.display = "none";
      document.getElementById("optionArea").innerHTML = "";
      document.getElementById("priceResult").innerHTML = "";

      const selectedCategory = this.value;
      const filteredMenus = menus.filter(menu => menu.category === selectedCategory);

      if (selectedCategory === "wash") {
        washMenuArea.style.display = "block";

        filteredMenus.forEach(menu => {
          const option = document.createElement("option");
          option.value = menu.menu_name;
          option.textContent = formatMenuName(menu.menu_name);
          menuSelect.appendChild(option);
        });

        return;
      }

      if (selectedCategory === "coating") {
        coatingArea.style.display = "block";
        renderCoatingMenus(filteredMenus);
      }
    });

    menuSelect.addEventListener("change", function() {
      if (!this.value) return;
      showPrice(this.value);
    });

    function renderCoatingMenus(coatingMenus) {
      coatingArea.innerHTML = `
        <div class="coating-heading">
          <div class="coating-heading-title">コーティングメニュー</div>
          <div class="coating-heading-text">
            塗装の状態やご希望に合わせて、最適なプランをお選びいただけます。
          </div>
        </div>
      `;

      ["ism","izm","over"].forEach(type => {
        const brandMenus = coatingMenus.filter(menu => getBrandType(menu.menu_name) === type);

        if (!brandMenus.length) return;

        const brand = getBrandInfo(type);

        const brandBlock = document.createElement("div");
        brandBlock.className = `coating-brand ${brand.className}`;

        brandBlock.innerHTML = `
          <div class="brand-panel">
            <div class="brand-title-line">
              <span class="brand-sub">${brand.sub}</span>
              <span class="brand-main">${brand.main}</span>
              <span class="brand-coat">${brand.coat}</span>
            </div>
            <div class="brand-desc">${brand.desc}</div>
          </div>

          <div class="plan-grid"></div>
        `;

        const planGrid = brandBlock.querySelector(".plan-grid");

        brandMenus.forEach(menu => {
          const priceData = sizePrices.find(price => price.menu_name === menu.menu_name);
          const priceText = priceData ? `${priceData.price.toLocaleString()}円` : "料金未設定";

          const planCard = document.createElement("div");
          planCard.className = "plan-card";

          planCard.innerHTML = `
            <div class="plan-badge">${getPlanLabel(menu.menu_name)}</div>
            <div class="plan-desc">${getPlanDescription(menu.menu_name)}</div>
            <div>
              <span class="plan-time-label">施工期間</span>
              <span class="plan-time">${menu.work_time}</span>
            </div>
            <div class="plan-price-label">料金（税込）</div>
            <div class="plan-price">${priceText}</div>
            <button
              type="button"
              class="select-plan-button"
              data-menu-name="${menu.menu_name}"
            >
              このプランを選択
            </button>
          `;

          planGrid.appendChild(planCard);
        });

        coatingArea.appendChild(brandBlock);
      });

      document.querySelectorAll(".select-plan-button").forEach(button => {
        button.addEventListener("click", function() {
          document.querySelectorAll(".select-plan-button").forEach(btn => {
            btn.classList.remove("active");
            btn.textContent = "このプランを選択";
          });

          this.classList.add("active");
          this.textContent = "選択中";

          showPrice(this.dataset.menuName);
        });
      });
    }

    async function showPrice(menuName) {
      const selectedSize =
        document.querySelector(".car-size")
          .textContent
          .replace("サイズ","")
          .trim();

      const carName =
        document.querySelector(".car-name")
          .textContent
          .trim();

      const displayMenuName = formatMenuName(menuName);

      const { data: prices } = await supabase
        .from("prices")
        .select("*")
        .eq("menu_name", menuName)
        .eq("size", selectedSize);

      if (!prices || !prices.length) {
        document.getElementById("priceResult").innerHTML =
          "<br>料金未設定";
        return;
      }

      const { data: menuData } = await supabase
        .from("menus")
        .select("*")
        .eq("menu_name", menuName);

      const { data: options } = await supabase
        .from("options")
        .select("*")
        .eq("size", selectedSize);

      const optionArea = document.getElementById("optionArea");

      optionArea.innerHTML = "<h3>追加オプション</h3>";

      options.forEach(option => {
        const optionTime = option.work_time || "";

        optionArea.innerHTML += `
          <label>
            <input
              type="checkbox"
              class="optionCheck"
              data-price="${option.price}"
              data-name="${option.option_name}"
              data-time="${optionTime}"
            >
            ${option.option_name}
            （${option.price.toLocaleString()}円）
            ${optionTime ? `<span class="option-time">／＋${optionTime}</span>` : ""}
          </label>
        `;
      });

      document.getElementById("priceResult").innerHTML = `
        <div class="result-divider"></div>

        <div class="result-section">
          <div class="result-label">施工メニュー</div>
          <div class="result-value">${displayMenuName}</div>
        </div>

        <div class="result-section">
          <div class="result-label">施工料金</div>
          <div class="result-value">${prices[0].price.toLocaleString()}円</div>
        </div>

        <div class="result-section">
          <div class="result-label">選択オプション</div>
          <div id="selectedOptionsResult" class="result-value">なし</div>
        </div>

        <div class="result-section">
          <div class="result-label">オプション合計</div>
          <div id="optionTotalResult" class="result-value">0円</div>
        </div>

        <div class="result-section">
          <div class="result-label">基本施工時間</div>

      const basePrice = prices[0].price;

      function updateTotal() {
        let optionTotal = 0;
        let selectedOptions = [];
        let selectedOptionsCopy = [];
        let selectedOptionTimes = [];
        let selectedOptionTimesCopy = [];

        document
          .querySelectorAll(".optionCheck:checked")
          .forEach(check => {
            const price = Number(check.dataset.price);
            const name = check.dataset.name;
            const time = check.dataset.time;

            optionTotal += price;

            selectedOptions.push(
              time
                ? `${name}<br><span class="option-time">＋${time}</span>`
                : name
            );

            selectedOptionsCopy.push(
              time
                ? `・${name}（＋${time}）`
                : `・${name}`
            );

            if (time) {
              selectedOptionTimes.push(`${name}（＋${time}）`);
              selectedOptionTimesCopy.push(`・${name}：＋${time}`);
            }
          });

        const selectedOptionsText =
          selectedOptions.length
            ? selectedOptions.join("<br>")
            : "なし";

        const selectedOptionsCopyText =
          selectedOptionsCopy.length
            ? selectedOptionsCopy.join("\\n")
            : "なし";

        const optionTimeText =
          selectedOptionTimes.length
            ? selectedOptionTimes.join("<br>")
            : "なし";

        const optionTimeCopyText =
          selectedOptionTimesCopy.length
            ? selectedOptionTimesCopy.join("\\n")
            : "なし";

        const totalPrice = basePrice + optionTotal;

        document.getElementById("optionTotalResult").textContent =
          `${optionTotal.toLocaleString()}円`;

        document.getElementById("totalPrice").textContent =
          `${totalPrice.toLocaleString()}円`;

        document.getElementById("selectedOptionsResult").innerHTML =
          selectedOptionsText;

        document.getElementById("estimateOptions").innerHTML =
          selectedOptionsText;

        document.getElementById("optionTimeResult").innerHTML =
          optionTimeText;

        document.getElementById("estimateOptionTime").innerHTML =
          selectedOptionTimes.length
            ? `オプション：<br>${optionTimeText}`
            : "オプション：なし";

        document.getElementById("estimateTotal").textContent =
          `${totalPrice.toLocaleString()}円（税込）`;

        currentEstimateText =
`RACY'SPEED お見積り内容

${optionTimeCopyText}
