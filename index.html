<style>
.reservation-card{
  margin-top:30px;
  padding:30px;
  border:1px solid #eadfca;
  border-radius:28px;
  background:
    radial-gradient(circle at top left, rgba(212,175,55,.13), transparent 34%),
    linear-gradient(180deg,#ffffff 0%,#fffdf8 48%,#faf7ef 100%);
  box-shadow:0 22px 55px rgba(30,24,14,.10);
  position:relative;
  overflow:hidden;
}
.reservation-card::before{
  content:"";
  position:absolute;
  left:24px;
  right:24px;
  top:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#d4af37,transparent);
}
.reservation-card .estimate-title{
  font-family:'Shippori Mincho', serif;
  letter-spacing:.12em;
  color:#221f1a;
}
.reservation-card .contact-subnote{
  color:#776b5b;
}
.reservation-calendar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:22px 0 14px;
  padding:16px 18px;
  border:1px solid rgba(212,175,55,.45);
  border-radius:22px;
  background:
    linear-gradient(135deg,#1d1a16 0%,#3a3021 52%,#1d1a16 100%);
  color:#fff;
  box-shadow:0 14px 28px rgba(34,25,12,.16);
}
.calendar-month-title{
  font-family:'Shippori Mincho', serif;
  font-size:18px;
  font-weight:700;
  letter-spacing:.18em;
  color:#f8edd1;
  text-shadow:0 1px 0 rgba(0,0,0,.2);
}
.calendar-nav-button{
  cursor:pointer;
  border:1px solid rgba(245,224,170,.55);
  background:rgba(255,255,255,.08);
  color:#f8edd1;
  border-radius:999px;
  padding:9px 15px;
  font-size:12px;
  letter-spacing:.12em;
  font-family:inherit;
  transition:.2s;
}
.calendar-nav-button:hover{
  background:rgba(212,175,55,.20);
  transform:translateY(-1px);
}
.calendar-legend{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:9px 16px;
  margin:14px 0 16px;
  color:#665b4c;
  font-size:12px;
  letter-spacing:.04em;
}
.calendar-legend span{
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.legend-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  display:inline-block;
  box-shadow:0 0 0 3px rgba(212,175,55,.08);
}
.legend-open{background:#d4af37;}
.legend-few{background:#b8872f;}
.legend-full{background:#bdb6aa;}
.legend-closed{background:#f0ece4; border:1px solid #d8d0c2; box-shadow:none;}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:14px;
  border:1px solid #efe5d3;
  border-radius:24px;
  background:rgba(255,255,255,.72);
}
.calendar-weekday{
  text-align:center;
  font-size:12px;
  color:#9a8660;
  padding:8px 0;
  letter-spacing:.12em;
}
.calendar-day{
  min-height:62px;
  border:1px solid #eadfca;
  border-radius:17px;
  background:linear-gradient(180deg,#fff 0%,#fffdf8 100%);
  cursor:pointer;
  font-size:14px;
  font-family:'Shippori Mincho', serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  transition:.18s;
  box-shadow:0 5px 14px rgba(45,34,16,.04);
}
.calendar-day:hover:not(:disabled){
  transform:translateY(-2px);
  border-color:#d4af37;
  box-shadow:0 12px 24px rgba(60,43,15,.12);
}
.calendar-day.empty{
  border:none;
  background:transparent;
  cursor:default;
  box-shadow:none;
}
.calendar-day.closed,
.calendar-day.past,
.calendar-day.unavailable{
  color:#aaa;
  background:#f3f0ea;
  cursor:not-allowed;
  box-shadow:none;
  border-color:#ebe5dc;
}
.calendar-day.available{
  background:linear-gradient(180deg,#fff 0%,#fff8e7 100%);
}
.calendar-day.few{
  background:linear-gradient(180deg,#fff 0%,#fff1d2 100%);
  border-color:#d2aa5a;
}
.calendar-day.selected{
  color:#1f1a12;
  border-color:#d4af37;
  font-weight:700;
  background:linear-gradient(180deg,#fff7df 0%,#f1dfad 100%);
  box-shadow:0 0 0 2px rgba(212,175,55,.42) inset,0 14px 26px rgba(75,55,18,.16);
}
.calendar-day-number{
  font-size:17px;
  line-height:1;
}
.calendar-day-status{
  font-size:11px;
  letter-spacing:.06em;
  color:#7f6a3d;
  white-space:nowrap;
}
.calendar-day.unavailable .calendar-day-status,
.calendar-day.closed .calendar-day-status,
.calendar-day.past .calendar-day-status{
  color:#9c9c9c;
}
.time-slot-area{
  margin-top:20px;
  padding:18px;
  border:1px solid #efe5d3;
  border-radius:22px;
  background:rgba(255,255,255,.74);
}
.time-slot-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}
.time-slot-button{
  cursor:pointer;
  border:1px solid #ddcfb3;
  background:#fff;
  border-radius:999px;
  padding:11px 16px;
  font-size:13px;
  font-family:inherit;
  transition:.18s;
}
.time-slot-button:hover:not(:disabled){
  border-color:#d4af37;
  box-shadow:0 8px 17px rgba(50,35,10,.10);
  transform:translateY(-1px);
}
.time-slot-button.active{
  background:linear-gradient(135deg,#231f19,#3a3021);
  color:#f8edd1;
  border-color:#d4af37;
}
.time-slot-button:disabled{
  color:#aaa;
  background:#f2efe9;
  cursor:not-allowed;
}
.reservation-form{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.reservation-form input,
.reservation-form textarea{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border:1px solid #e0d6c6;
  border-radius:14px;
  font-size:14px;
  font-family:inherit;
  background:#fff;
}
.reservation-form input:focus,
.reservation-form textarea:focus{
  outline:none;
  border-color:#d4af37;
  box-shadow:0 0 0 3px rgba(212,175,55,.13);
}
.reservation-form textarea{
  min-height:88px;
  resize:vertical;
}
.reservation-selected-date{
  margin-top:14px;
  font-weight:700;
  color:#2d2924;
  text-align:center;
}
.total-card-center{
  text-align:center;
}
.total-price-inline{
  display:flex;
  justify-content:center;
  align-items:baseline;
  gap:8px;
  flex-wrap:wrap;
}
.total-price-inline .info{
  margin:0;
}
.option-time-inline{
  display:inline;
  white-space:nowrap;
}
@media (max-width:560px){
  .reservation-card{padding:22px 16px;}
  .reservation-calendar-head{padding:14px 12px;}
  .calendar-month-title{font-size:16px;letter-spacing:.1em;}
  .calendar-nav-button{padding:8px 11px;font-size:11px;}
  .calendar-grid{gap:5px;padding:9px;border-radius:18px;}
  .calendar-day{min-height:52px;border-radius:12px;}
  .calendar-day-status{font-size:10px;}
}

  function toKatakana(str) {
    return str.replace(/[ぁ-ん]/g, char =>
      String.fromCharCode(char.charCodeAt(0) + 0x60)
    );
  }

  function toHalfWidth(str) {
    return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, char =>
      String.fromCharCode(char.charCodeAt(0) - 0xFEE0)
    );
  }

  function normalizeText(str) {
    return toHalfWidth(toKatakana(String(str)))
      .toLowerCase()
      .replace(/[・\s　\-\_\.\/／]/g, "")
      .replace(/[（）\(\)]/g, "");
  }

  function getAliasWords(car) {
    const words = [];

    if (car.maker === "メルセデス・ベンツ") {
      words.push("ベンツ","benz","mercedes","mercedesbenz","mb");
    }

    if (car.maker === "フォルクスワーゲン") {
      words.push("vw","volkswagen","ワーゲン");
    }

    if (car.maker === "レクサス") words.push("lexus");
    if (car.maker === "トヨタ") words.push("toyota");
    if (car.maker === "ホンダ") words.push("honda");
    if (car.maker === "日産") words.push("nissan");
    if (car.maker === "マツダ") words.push("mazda");
    if (car.maker === "スバル") words.push("subaru");
    if (car.maker === "スズキ") words.push("suzuki");
    if (car.maker === "ダイハツ") words.push("daihatsu");
    if (car.maker === "三菱") words.push("mitsubishi");
    if (car.maker === "テスラ") words.push("tesla");
    if (car.maker === "ポルシェ") words.push("porsche");
    if (car.maker === "アウディ") words.push("audi");
    if (car.maker === "ボルボ") words.push("volvo");
    if (car.maker === "ジープ") words.push("jeep");
    if (car.maker === "ランドローバー") words.push("landrover","rangerover");

    if (car.model === "プリウス") words.push("prius");
    if (car.model === "アルファード") words.push("alphard","アル");
    if (car.model === "ヴェルファイア") words.push("vellfire");
    if (car.model === "ハイエース") words.push("hiace");
    if (car.model === "ランドクルーザー250" || car.model === "ランドクルーザー300") {
      words.push("ランクル","landcruiser");
    }

    return words;
  }

  function getSearchText(car) {
    return normalizeText([
      car.maker,
      car.model,
      `${car.maker}${car.model}`,
      ...getAliasWords(car)
    ].join(" "));
  }

  function getSearchScore(car, keyword) {
    const maker = normalizeText(car.maker);
    const model = normalizeText(car.model);
    const makerModel = normalizeText(`${car.maker}${car.model}`);
    const searchText = getSearchText(car);

    if (model === keyword) return 100;
    if (makerModel === keyword) return 95;
    if (model.startsWith(keyword)) return 90;
    if (makerModel.startsWith(keyword)) return 85;
    if (maker.startsWith(keyword)) return 80;
    if (searchText.includes(keyword)) return 60;

    return 0;
  }

  function getMakerSortIndex(maker) {
    if (JAPANESE_MAKERS.includes(maker)) return JAPANESE_MAKERS.indexOf(maker);
    if (IMPORT_MAKERS.includes(maker)) return 100 + IMPORT_MAKERS.indexOf(maker);
    return 999;
  }

  function addMakerOptions() {
    const makers = [...new Set(cars.map(car => car.maker))]
      .sort((a,b) => {
        const diff = getMakerSortIndex(a) - getMakerSortIndex(b);
        if (diff !== 0) return diff;
        return a.localeCompare(b,"ja");
      });

    makerSelect.innerHTML = '<option value="">メーカーを選択</option>';

    const japaneseGroup = document.createElement("optgroup");

    const importGroup = document.createElement("optgroup");

    const otherGroup = document.createElement("optgroup");

      if (JAPANESE_MAKERS.includes(maker)) {

        otherGroup.appendChild(option);

    const car = cars.find(item =>
      item.maker === option.dataset.maker &&

    if (car) showCar(car);

  carSearch.addEventListener("input", function() {
    const rawKeyword = this.value.trim();
    const keyword = normalizeText(rawKeyword);

    searchResults.innerHTML = "";

    if (!keyword) {
      searchResults.style.display = "none";
      return;
    }

    const keywords = rawKeyword
      .split(/\s+/)
      .map(word => normalizeText(word))
      .filter(Boolean);

    const effectiveKeywords = keywords.length ? keywords : [keyword];

    const matchedCars = cars
      .map(car => {
        const searchText = getSearchText(car);

        const isMatch =
          effectiveKeywords.every(word => searchText.includes(word)) ||
          searchText.includes(keyword);

        if (!isMatch) return null;

        const score = Math.max(
          getSearchScore(car, keyword),
          ...effectiveKeywords.map(word => getSearchScore(car, word))
        );

        return { car, score };
      })
      .filter(Boolean)

        if (b.score !== a.score) return b.score - a.score;

  function isClosedDay(dateString) {
    const date = new Date(dateString + "T00:00:00");
    const day = date.getDay();
    return day === 1 || day === 2;
  }

  function isPastDate(dateString) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const date = new Date(dateString + "T00:00:00");
    return date < today;
  }

  function formatDateString(date) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function addBusinessDays(startDateString, workDays) {
    const dates = [];
    const date = new Date(startDateString + "T00:00:00");

    while (dates.length < workDays) {
      const dateString = formatDateString(date);

      if (!isClosedDay(dateString)) {
        dates.push(dateString);
      }

      date.setDate(date.getDate() + 1);
    }

    return dates;
  }

  function timeToMinutes(timeString) {
    const [hour, minute] = String(timeString).slice(0,5).split(":").map(Number);
    return hour * 60 + minute;
  }

  function hourToTime(hour) {
    return `${String(hour).padStart(2,"0")}:00`;
  }

  function addHours(timeString, hours) {
    const minutes = Math.round(timeToMinutes(timeString) + hours * 60);
    const hour = Math.floor(minutes / 60);
    const minute = minutes % 60;
    return `${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")}`;
  }

  function isTimeOverlap(startA, endA, startB, endB) {
    return timeToMinutes(startA) < timeToMinutes(endB) &&
      timeToMinutes(endA) > timeToMinutes(startB);
  }

  function isPureHandWash(menuData) {
    return menuData.menu_name === "純水手洗い洗車";
  }

  function isThoroughWash(menuData) {
    return menuData.menu_name === "徹底洗車";
  }

  function isLightWash(menuData) {
    return menuData.menu_name === "徹底洗車ライト";
  }

  function isWashMenu(menuData) {
    return WASH_MENU_NAMES.includes(menuData.menu_name);
  }

  function getEffectiveWorkDays(menuData) {
    if (isThoroughWash(menuData)) return 3;
    if (isLightWash(menuData)) return 1;
    return Number(menuData.work_days || 1);
  }

  function dateRangesOverlap(startA, endA, startB, endB) {
    return startA <= endB && endA >= startB;
  }

  function isWashReservation(reservation) {
    return WASH_MENU_NAMES.includes(reservation.menu_name);
  }

  function parseWorkTimeToHours(timeText) {
    const text = String(timeText || "");
    if (!text || text === "なし") return 0;

    let totalMinutes = 0;

    const hourMatches = [...text.matchAll(/(\d+(?:\.\d+)?)\s*時間/g)];
    hourMatches.forEach(match => {
      totalMinutes += Number(match[1]) * 60;
    });

    const minuteMatches = [...text.matchAll(/(\d+(?:\.\d+)?)\s*分/g)];
    minuteMatches.forEach(match => {
      totalMinutes += Number(match[1]);
    });

    return totalMinutes / 60;
  }

  function getSelectedOptionDurationHours() {
    let optionHours = 0;

    document.querySelectorAll(".optionCheck:checked").forEach(check => {
      optionHours += parseWorkTimeToHours(check.dataset.time);
    });

    return optionHours;
  }

  function getWashReservationDurationHours(menuData) {
    if (isPureHandWash(menuData)) {
      return WASH_DURATION_HOURS + getSelectedOptionDurationHours();
    }

    const baseHours = parseWorkTimeToHours(menuData.work_time) || WASH_DURATION_HOURS;
    return baseHours + getSelectedOptionDurationHours();
  }

  async function checkGoogleCalendarAvailability(dateString, menuData) {
    try {
      const res = await fetch(
        `${supabaseUrl}/functions/v1/check-availability`,
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "apikey":supabaseKey,
            "Authorization":`Bearer ${supabaseKey}`
          },
          body:JSON.stringify({
            date:dateString,
            menu_name:menuData.menu_name
          })
        }
      );

      const data = await res.json();

      if (!res.ok || !data.ok) {
        console.error("check-availability error", data);
        return {
          ok:false,
          available:false,
          mark:"×",
          reason:"予約状況の確認中にエラーが発生しました。",
          message:"予約状況の確認中にエラーが発生しました。",
          slots:[]
        };
      }

      return data;

    } catch (error) {
      console.error(error);

      return {
        ok:false,
        available:false,
        mark:"×",
        reason:"予約状況の確認中にエラーが発生しました。",
        message:"予約状況の確認中にエラーが発生しました。",
        slots:[]
      };
    }
  }

  function isReceptionClosedResult(result) {
    const text = `${result.reason || ""}${result.message || ""}`;
    return text.includes("2日前") || text.includes("受付");
  }

  function isClosedResult(result) {
    const text = `${result.mark || ""}${result.reason || ""}${result.message || ""}`;
    return (
      result.mark === "休" ||
      text.includes("臨時休業") ||
      text.includes("定休日") ||
      text.includes("店休日") ||
      text.includes("休業")
    );
  }

  function getUnavailableMessage(result) {
    return result.reason || result.message || "この日は予約できません。";
  }

  function applyCalendarButtonStatus(button, statusLabel, result, fallbackUnavailableText = "✕満枠") {
    button.classList.remove("available", "few", "unavailable", "closed", "past");

    if (!result || result.ok === false) {
      button.classList.add("unavailable");
      button.disabled = true;
      statusLabel.textContent = "✕確認不可";
      button.title = "予約状況を確認できませんでした";
      return;
    }

    if (isClosedResult(result)) {
      button.classList.add("closed");
      button.disabled = true;
      statusLabel.textContent = "休";
      button.title = getUnavailableMessage(result);
      return;
    }

    if (isReceptionClosedResult(result)) {
      button.classList.add("unavailable");
      button.disabled = true;
      statusLabel.textContent = "✕受付終了";
      button.title = getUnavailableMessage(result);
      return;
    }

    if (!result.available) {
      button.classList.add("unavailable");
      button.disabled = true;
      statusLabel.textContent = fallbackUnavailableText;
      button.title = getUnavailableMessage(result);
      return;
    }

    const mark = result.mark || "〇";

    if (mark === "△") {
      button.classList.add("few");
      button.disabled = false;
      statusLabel.textContent = "△残りわずか";
      button.title = "残りわずか";
      return;
    }

    button.classList.add("available");
    button.disabled = false;
    statusLabel.textContent = "○空きあり";
    button.title = "空きあり";
  }

  async function isWashBlockDateAvailable(startDate, menuData) {
    if (isClosedDay(startDate)) {
      return {
        ok:false,
        message:"月曜・火曜は定休日のため選択できません。"
      };
    }

    if (isPastDate(startDate)) {
      return {
        ok:false,
        message:"過去の日付は選択できません。"
      };
    }

    const result = await checkGoogleCalendarAvailability(startDate, menuData);

    if (!result.ok || !result.available) {
      return {
        ok:false,
        message:getUnavailableMessage(result)
      };
    }

    return {
      ok:true,
      endDate:result.end_date || startDate,
      blockDates:[],
      startTime:FULL_DAY_WASH_START_TIME,
      endTime:FULL_DAY_WASH_END_TIME
    };
  }

  async function isMainDateAvailable(startDate, menuData) {
    if (isClosedDay(startDate)) {
      return {
        ok:false,
        message:"月曜・火曜は定休日のため選択できません。"
      };
    }

    if (isPastDate(startDate)) {
      return {
        ok:false,
        message:"過去の日付は選択できません。"
      };
    }

    const result = await checkGoogleCalendarAvailability(startDate, menuData);

    if (!result.ok || !result.available) {
      return {
        ok:false,
        message:getUnavailableMessage(result)
      };
    }

    return {
      ok:true,
      endDate:result.end_date || startDate,
      blockDates:[],
      message:""
    };
  }

  async function getAvailableWashSlots(dateString, menuData) {
    if (isClosedDay(dateString)) {
      return [];
    }

    if (isPastDate(dateString)) {
      return [];
    }

    const result = await checkGoogleCalendarAvailability(dateString, menuData);

    if (!result.ok || !result.available || !Array.isArray(result.slots)) {
      return [];
    }

    return result.slots.map(slot => ({
      startTime:String(slot.start_time || slot.time || "").slice(0,5),
      endTime:String(slot.end_time || "").slice(0,5),
      available:!!slot.available
    }));
  }

    document.getElementById("nextMonthBtn").addEventListener("click", function() {
      const nextMonth = new Date(calendarYear, calendarMonth + 1, 1);
      calendarYear = nextMonth.getFullYear();
      calendarMonth = nextMonth.getMonth();
      renderCalendar();
    });

    async function renderCalendar() {
      resetReservationSelection();

      const calendar = document.getElementById("reservationCalendar");
      const title = document.getElementById("calendarMonthTitle");
      const firstDate = new Date(calendarYear, calendarMonth, 1);
      const lastDate = new Date(calendarYear, calendarMonth + 1, 0);
      const weekdays = [
        { ja:"日", en:"SUN" },
        { ja:"月", en:"MON" },
        { ja:"火", en:"TUE" },
        { ja:"水", en:"WED" },
        { ja:"木", en:"THU" },
        { ja:"金", en:"FRI" },
        { ja:"土", en:"SAT" }
      ];

      title.textContent = `${calendarYear}年${calendarMonth + 1}月`;
      calendar.innerHTML = "";

      weekdays.forEach(day => {
        const weekday = document.createElement("div");
        weekday.className = "calendar-weekday";
        weekday.innerHTML = `
          <span class="calendar-weekday-ja">${day.ja}</span>
          <span class="calendar-weekday-en">${day.en}</span>
        `;
        calendar.appendChild(weekday);
      });

      for (let i = 0; i < firstDate.getDay(); i++) {
        const empty = document.createElement("button");
        empty.type = "button";
        empty.className = "calendar-day empty";
        empty.disabled = true;
        calendar.appendChild(empty);
      }

      const dayButtons = [];

      for (let day = 1; day <= lastDate.getDate(); day++) {
        const date = new Date(calendarYear, calendarMonth, day);
        const dateString = formatDateString(date);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "calendar-day";
        button.dataset.date = dateString;
        button.innerHTML = `
          <span class="calendar-day-number">${day}</span>
          <span class="calendar-day-status">確認中</span>
        `;

        const statusLabel = button.querySelector(".calendar-day-status");

        if (isClosedDay(dateString)) {
          button.classList.add("closed");
          button.disabled = true;
          button.title = "定休日";
          statusLabel.textContent = "定休日";
        } else if (isPastDate(dateString)) {
          button.classList.add("past");
          button.disabled = true;
          statusLabel.textContent = "－";
        } else {
          button.disabled = true;
          dayButtons.push({ button, statusLabel, dateString });
        }

        button.addEventListener("click", async function() {
          document.querySelectorAll(".calendar-day").forEach(dayButton => {
            dayButton.classList.remove("selected");
          });

          this.classList.add("selected");
          await handleDateSelected(dateString, menuData);
        });

        calendar.appendChild(button);
      }

      await Promise.all(dayButtons.map(async item => {
        const { button, statusLabel, dateString } = item;
        const result = await checkGoogleCalendarAvailability(dateString, menuData);
        applyCalendarButtonStatus(button, statusLabel, result, "✕満枠");
      }));
    }

    await renderCalendar();
  }

  async function handleDateSelected(dateString, menuData) {
    const selectedDate = document.getElementById("reservationSelectedDate");
    const timeSlotArea = document.getElementById("timeSlotArea");
    const message = document.getElementById("reservationMessage");

    resetReservationSelection();
    selectedDate.textContent = `選択日：${dateString}`;

    if (isPureHandWash(menuData)) {
      message.textContent = "空き時間を確認しています。";

      const availability = await checkGoogleCalendarAvailability(dateString, menuData);
      message.textContent = "";

      if (!availability.ok || !availability.available) {
        message.textContent = getUnavailableMessage(availability);
        return;
      }

      const slots = Array.isArray(availability.slots)
        ? availability.slots.map(slot => ({
            startTime:String(slot.start_time || slot.time || "").slice(0,5),
            endTime:String(slot.end_time || "").slice(0,5),
            available:!!slot.available
          }))
        : [];

      if (!slots.length || !slots.some(slot => slot.available)) {
        message.textContent = "この日は純水手洗い洗車の空き枠がありません。";
        return;
      }

      timeSlotArea.innerHTML = `
        <div class="result-label">開始時間を選択</div>
        <div class="time-slot-grid"></div>
      `;

      const grid = timeSlotArea.querySelector(".time-slot-grid");

      slots.forEach(slot => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "time-slot-button";
        button.textContent = slot.startTime;
        button.title = `作業終了目安：${slot.endTime}`;
        button.disabled = !slot.available;

        button.addEventListener("click", function() {
          document.querySelectorAll(".time-slot-button").forEach(slotButton => {
            slotButton.classList.remove("active");
            slotButton.style.background = "";
            slotButton.style.color = "";
            slotButton.style.borderColor = "";
          });

          this.classList.add("active");
          this.blur();

          // スマホブラウザの描画遅延対策：タップ直後に強制再描画
          void this.offsetHeight;

          requestAnimationFrame(() => {
            this.classList.add("active");
          });

          message.textContent = "この時間で仮予約できます。";

          showReservationForm({
            startDate:dateString,
            endDate:dateString,
            startTime:slot.startTime,
            endTime:slot.endTime,
            menuData
          });
        });

        grid.appendChild(button);
      });

      return;
    }

    if (isThoroughWash(menuData) || isLightWash(menuData)) {
      message.textContent = "空き状況を確認しています。";

      const available = await isWashBlockDateAvailable(dateString, menuData);
      message.textContent = "";

      if (!available.ok) {
        message.textContent = available.message;
        return;
      }

      timeSlotArea.innerHTML = `
        <div class="result-label">開始時間を選択</div>
        <div class="time-slot-grid"></div>
      `;

      const grid = timeSlotArea.querySelector(".time-slot-grid");
      const button = document.createElement("button");
      button.type = "button";
      button.className = "time-slot-button";
      button.textContent = available.startTime;
      button.title = `施工終了予定日：${available.endDate}`;

      button.addEventListener("click", function() {
        document.querySelectorAll(".time-slot-button").forEach(slotButton => {
          slotButton.classList.remove("active");
        });

        this.classList.add("active");
        message.textContent = `この日程で仮予約できます。作業期間：${dateString}〜${available.endDate}`;

        showReservationForm({
          startDate:dateString,
          endDate:available.endDate,
          startTime:available.startTime,
          endTime:available.endTime,
          menuData
        });
      });

      grid.appendChild(button);
      return;
    }

    message.textContent = "空き状況を確認しています。";
    const available = await isMainDateAvailable(dateString, menuData);

    if (!available.ok) {
      message.textContent = available.message;
      return;
    }

    message.textContent = `この日程は仮予約可能です。施工終了予定日：${available.endDate}`;

    showReservationForm({
      startDate:dateString,
      endDate:available.endDate,
      startTime:null,
      endTime:null,
      menuData
    });
  }

  function showReservationForm({ startDate, endDate, startTime, endTime, menuData }) {
    const oldForm = document.getElementById("reservationForm");
    if (oldForm) oldForm.remove();

    const reservationArea = document.getElementById("reservationArea");
    let timeText = "";

    if (isPureHandWash(menuData) && startTime && endTime) {
      timeText = `<div class="contact-subnote reservation-time-note">開始時間：<span>${startTime}</span><br>作業終了目安：<span>${isLightWash(menuData) ? FULL_DAY_WASH_END_TIME : endTime}</span></div>`;
    } else if ((isThoroughWash(menuData) || isLightWash(menuData)) && startDate && endDate) {
      timeText = `<div class="contact-subnote reservation-time-note">開始時間：<span>${startTime || FULL_DAY_WASH_START_TIME}</span><br>作業期間：<span>${startDate}〜${endDate}</span></div>`;
    } else if (startDate && endDate) {
      timeText = `<div class="contact-subnote reservation-time-note">施工期間：<span>${startDate}〜${endDate}</span></div>`;
    }

    reservationArea.insertAdjacentHTML(
      "beforeend",
      `
        <div id="reservationForm" class="reservation-form">
          ${timeText}

          <input
            id="customerName"
            type="text"
            placeholder="お名前"
          >

          <input
            id="customerPhone"
            type="tel"
            placeholder="電話番号（必須）"
          >

          <input
            id="customerEmail"
            type="email"
            placeholder="メールアドレス（必須）"
          >

          <textarea
            id="customerNote"
            placeholder="ご要望・備考（任意）"
          ></textarea>

          <button
            id="saveReservationBtn"
            class="line-button"
            type="button"
          >
            仮予約する
          </button>

          <div
            id="reservationSaveMessage"
            class="copy-message"
          ></div>
        </div>
      `
    );

    document
      .getElementById("saveReservationBtn")
      .addEventListener("click", () => saveReservation({
        startDate,
        endDate,
        startTime,
        endTime,
        menuData
      }));
  }

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || ""));
  }

  async function saveReservation({ startDate, endDate, startTime, endTime, menuData }) {
    const customerName = document.getElementById("customerName").value.trim();
    const customerPhone = document.getElementById("customerPhone").value.trim();
    const customerEmail = document.getElementById("customerEmail").value.trim();
    const customerNote = document.getElementById("customerNote").value.trim();
    const saveMessage = document.getElementById("reservationSaveMessage");
    const saveButton = document.getElementById("saveReservationBtn");

    if (!customerName) {
      saveMessage.textContent = "お名前を入力してください。";
      return;
    }

    if (!customerPhone) {
      saveMessage.textContent = "電話番号を入力してください。";
      return;
    }

    if (!customerEmail) {
      saveMessage.textContent = "メールアドレスを入力してください。";
      return;
    }

    if (!isValidEmail(customerEmail)) {
      saveMessage.textContent = "正しいメールアドレスを入力してください。";
      return;
    }

    saveButton.disabled = true;
    saveMessage.textContent = "予約状況を再確認しています。";

    let bookingLane = menuData.booking_lane || "main";

    if (isPureHandWash(menuData)) {
      bookingLane = "sub";
      const slots = await getAvailableWashSlots(startDate, menuData);
      const targetSlot = slots.find(slot =>
        slot.startTime === startTime &&
        slot.endTime === endTime &&
        slot.available
      );

      if (!targetSlot) {
        saveButton.disabled = false;
        saveMessage.textContent = "この時間は先に予約が入ったため選択できません。別の時間をお選びください。";
        return;
      }
    } else if (isThoroughWash(menuData) || isLightWash(menuData)) {
      bookingLane = "main";
      const available = await isWashBlockDateAvailable(startDate, menuData);
      if (!available.ok) {
        saveButton.disabled = false;
        saveMessage.textContent = available.message;
        return;
      }
    } else {
      bookingLane = "main";
      const available = await isMainDateAvailable(startDate, menuData);
      if (!available.ok) {
        saveButton.disabled = false;
        saveMessage.textContent = available.message;
        return;
      }
    }

    const selectedOptions = [];
document.querySelectorAll(".optionCheck:checked").forEach(check => {
  selectedOptions.push(check.dataset.name);
});

const totalPrice = currentQuoteState ? currentQuoteState.totalPrice : Number(
  document.getElementById("totalPrice").textContent.replace(/[^\d]/g, "")
);

const selectedSize = currentQuoteState ? currentQuoteState.selectedSize : currentSelectedCar.size;
const selectedMenuName = currentQuoteState ? currentQuoteState.menuName : menuData.menu_name;

const reservationPayload = {
  customer_name: customerName,
  phone: customerPhone,
  email: customerEmail,
  maker: currentSelectedCar.maker,
  model: currentSelectedCar.model,
  size: selectedSize,
  menu_name: selectedMenuName,
  options: selectedOptions.join(" / "),
  total_price: totalPrice,
  work_time: menuData.work_time,
  work_days: getEffectiveWorkDays(menuData),
  start_date: startDate,
  end_date: endDate,
  start_time: startTime,
  end_time: endTime,
  status: "仮予約",
  booking_lane: bookingLane,
  daily_limit: Number(menuData.daily_limit || 1),

  reservation_source: reservationSource,
  customer_line_user_id: customerLineUserId
};

const { error } = await supabase
  .from("reservations")
  .insert([
    reservationPayload
  ]);

if (!error) {
  fetch("https://klfijtvnbgdkqcslntsp.supabase.co/functions/v1/send-admin-line", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(reservationPayload)
  }).catch(err => {
    console.error("LINE通知エラー", err);
  });
}

    if (error) {
      console.error(error);
      saveButton.disabled = false;
      saveMessage.textContent = "保存に失敗しました。Supabaseの列名・RLS設定を確認してください。";
      return;
    }

    const existingLineButton = document.getElementById("reservationLineBtn");
    if (existingLineButton) existingLineButton.remove();

    saveMessage.innerHTML = `
      仮予約を受付しました。<br><br>
      現在は仮予約の状態です。<br>
      管理者が内容を確認後、予約確定となります。<br><br>
      予約確定後、メール・LINEまたはお電話にてご連絡いたします。
    `;
  }
}

/* Auto center scroll: clicked / next operation area */
function centerScrollToElement(element, delay = 80) {
  if (!element) return;

  window.setTimeout(() => {
    try {
      element.scrollIntoView({
        behavior: "smooth",
        block: "center",
        inline: "nearest"
      });
    } catch (_error) {
      const rect = element.getBoundingClientRect();
      const targetTop = window.pageYOffset + rect.top - (window.innerHeight / 2) + (rect.height / 2);
      window.scrollTo({
        top: Math.max(0, targetTop),
        behavior: "smooth"
      });
    }
  }, delay);
}

function getFirstVisibleElement(selectors) {
  for (const selector of selectors) {
    const element = document.querySelector(selector);
    if (!element) continue;

    const rect = element.getBoundingClientRect();
    const style = window.getComputedStyle(element);

    if (
      rect.width > 0 &&
      rect.height > 0 &&
      style.display !== "none" &&
      style.visibility !== "hidden"
    ) {
      return element;
    }
  }

  return null;
}

function centerNextReservationStep(type) {
  const nextTargets = {
    carSelected: [
      "#categorySelect",
      ".category-area",
      "#result"
    ],
    makerSelected: [
      "#carSelect"
    ],
    categorySelected: [
      "#menuSelect",
      "#coatingArea .plan-card",
      "#coatingArea",
      ".wash-menu-area"
    ],
    menuSelected: [
      "#optionArea",
      "#priceResult",
      ".reservation-card"
    ],
    optionSelected: [
      ".reservation-card",
      "#priceResult"
    ],
    dateSelected: [
      ".time-slot-area",
      ".reservation-form",
      "#reservationMessage"
    ],
    timeSelected: [
      ".reservation-form",
      "#customerName",
      "#customerPhone",
      "#customerEmail",
      "#reservationMessage"
    ],
    formSelected: [
      ".reservation-form"
    ]
  };

  const target = getFirstVisibleElement(nextTargets[type] || []);
  centerScrollToElement(target, 120);
}

document.addEventListener("change", (event) => {
  const target = event.target;
  if (!target) return;

  if (target.id === "makerSelect") {
    centerNextReservationStep("makerSelected");
    return;
  }

  if (target.id === "carSelect") {
    centerNextReservationStep("carSelected");
    return;
  }

  if (target.id === "categorySelect") {
    centerNextReservationStep("categorySelected");
    return;
  }

  if (target.id === "menuSelect") {
    centerNextReservationStep("menuSelected");
    return;
  }

  if (target.classList && target.classList.contains("optionCheck")) {
    centerNextReservationStep("optionSelected");
    return;
  }
}, true);

document.addEventListener("click", (event) => {
  const target = event.target;
  if (!target) return;

  const quickCarButton = target.closest(".quick-car-button");
  if (quickCarButton) {
    centerNextReservationStep("carSelected");
    return;
  }

  const searchItem = target.closest(".search-result-item, .search-result, [data-maker][data-model]");
  if (searchItem && !quickCarButton) {
    centerNextReservationStep("carSelected");
    return;
  }

  const planButton = target.closest(".select-plan-button, .plan-card");
  if (planButton) {
    centerNextReservationStep("menuSelected");
    return;
  }

  const calendarDay = target.closest(".calendar-day.available, .calendar-day.few");
  if (calendarDay) {
    centerScrollToElement(calendarDay, 20);
    centerNextReservationStep("dateSelected");
    return;
  }

  const timeSlotButton = target.closest(".time-slot-button:not(:disabled)");
  if (timeSlotButton) {
    centerScrollToElement(timeSlotButton, 20);
    centerNextReservationStep("timeSelected");
    return;
  }

  const clickableControl = target.closest("select, input, textarea, button");
  if (clickableControl) {
    centerScrollToElement(clickableControl, 40);
  }
}, true);

document.addEventListener("focusin", (event) => {
  const target = event.target;
  if (!target) return;

  if (target.matches("input, textarea, select")) {
    centerScrollToElement(target, 180);
  }
}, true);

</script>
