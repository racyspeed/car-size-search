<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>料金シミュレーター｜RACY'SPEED</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Shippori Mincho', serif;
  background:linear-gradient(180deg,#f7f6f3 0%,#eeeeea 100%);
  padding:32px 16px;
  color:#111;
}
  
.container{
  max-width:760px;
  margin:auto;
  background:#fff;
  padding:48px;
  border:1px solid #d7d2ca;
  box-shadow:0 22px 55px rgba(0,0,0,0.09);
}

.shop-name{
  text-align:center;
  font-size:18px;
  letter-spacing:0.12em;
  font-weight:700;
  margin-bottom:28px;
}

.section-en{
  text-align:center;
  font-size:54px;
  font-weight:700;
  line-height:1;
  margin-bottom:14px;
  letter-spacing:0.03em;
}

h2{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#555;
  margin-bottom:34px;
  font-size:14px;
}

.search-panel{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(8px);
  padding:22px;
  border:1px solid #d8d2ca;
  margin-bottom:30px;
  box-shadow:0 10px 24px rgba(0,0,0,0.06);
}

.search-box{
  margin-bottom:18px;
}

.search-box label{
  display:block;

}

#carSearch{
  width:100%;
  padding:15px 16px;
  border:1px solid #cfc8be;
  font-family:'Shippori Mincho', serif;

  box-sizing:border-box;
  background:#fff;
}

#carSearch:focus{
  outline:none;
  border-color:#111;
}

.search-results{
  margin-top:8px;
  border:1px solid #ddd;
  background:#fff;
  display:none;
  max-height:320px;
  overflow:auto;
}

.search-result-item{
  padding:13px 15px;
  border-bottom:1px solid #eee;

}

.search-result-item:hover{
  background:#f6f4ef;
}

.search-result-item:last-child{
  border-bottom:none;
}

.select-note{
  text-align:center;
  margin:16px 0;
  color:#777;
  font-size:13px;
}

select{
  width:100%;
  padding:15px 16px;
  margin-bottom:16px;
  border:1px solid #cfc8be;
  border-radius:0;
  font-family:'Shippori Mincho', serif;
  font-size:16px;
  background:#fff;
}

select:focus{
  outline:none;
  border-color:#111;
}

#result{
  margin-top:34px;
  padding:34px;
  background:#fff;
  border:1px solid #ddd6cc;
}

.car-name{
  font-size:25px;
  font-weight:700;
  margin-bottom:12px;
}

.car-size{
  display:inline-block;
  padding:7px 16px;
  background:#111;
  color:#fff;
  font-size:14px;
  font-weight:600;
  margin-bottom:24px;
}

.result-section{
  margin-top:30px;
}

.result-label{
  font-size:13px;
  color:#666;
  letter-spacing:0.12em;
  margin-bottom:8px;
  font-weight:700;
}

.result-value{
  font-size:19px;
  font-weight:600;
  line-height:1.8;
}

.result-price{
  font-size:42px;
  font-weight:700;
}

.result-divider{
  height:1px;
  background:#ddd6cc;
  margin:26px 0;
}

.info{
  margin-top:8px;
  color:#666;
  font-size:14px;
}

#optionArea{
  margin-top:30px;
  padding:24px;
  border:1px solid #ddd6cc;
  background:#faf9f6;
}

#optionArea h3{
  margin-top:0;
  margin-bottom:18px;
  font-size:20px;
  font-weight:700;
}

#optionArea label{
  display:block;
  margin:12px 0;
  font-size:15px;
  line-height:1.6;
}

.optionCheck{
  margin-right:8px;
}

.total-card{
  margin-top:30px;
  padding:30px 24px;
  background:linear-gradient(135deg,#050505 0%,#1a1a1a 55%,#050505 100%);
  color:#fff;
  text-align:center;
  border:1px solid #2b2b2b;
  box-shadow:0 16px 35px rgba(0,0,0,0.18);
}

.total-card .result-label{
  color:#e8e0d4;
  font-size:14px;
  letter-spacing:0.18em;
}

.total-card .result-price{
  color:#fff;
  font-size:56px;
  margin-top:10px;
  letter-spacing:0.02em;
}

.total-card .info{
  color:#d8d8d8;
}

.estimate-card{
  margin-top:34px;
  padding:30px;
  border:1px solid #d8d2ca;
  background:#fff;
}

.estimate-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:24px;
  text-align:center;
}

.estimate-row{
  border-top:1px solid #e5e0d8;
  padding:18px 0;
}

.estimate-label{
  font-size:13px;
  color:#666;
  letter-spacing:0.12em;
  font-weight:700;
  margin-bottom:8px;
}

.estimate-value{
  font-size:18px;
  font-weight:600;
  line-height:1.8;
}

.estimate-total{
  font-size:30px;
  font-weight:700;
}

.estimate-actions{
  margin-top:28px;
  display:flex;
  gap:12px;
  flex-direction:column;
}

.contact-note{
  margin:0;
  font-size:15px;
  line-height:1.8;
  text-align:center;
  color:#222;
}

.contact-subnote{
  margin:8px 0 16px;
  font-size:13px;
  line-height:1.6;
  text-align:center;
  color:#777;
}

.copy-button,
.line-button{
  display:block;
  width:100%;
  padding:16px;
  text-align:center;
  font-family:'Shippori Mincho', serif;
  font-size:16px;
  font-weight:700;
  text-decoration:none;
  cursor:pointer;
  box-sizing:border-box;
}

.copy-button{
  background:#fff;
  color:#111;
  border:1px solid #111;
}

.line-button{
  background:#06c755;
  color:#fff;
  border:1px solid #06c755;
}

.copy-message{
  margin-top:10px;
  font-size:14px;
  color:#555;
  text-align:center;
}

@media(max-width:600px){
  body{
    padding:12px 8px;
    font-size:14px;
  }

  .container{
    padding:24px 14px;
  }

  .shop-name{
    font-size:14px;
    margin-bottom:22px;
  }

  .section-en{
    font-size:34px;
  }

  h2{
    font-size:18px;
  }

  .subtitle{
    font-size:12px;
    margin-bottom:24px;
  }

  .search-panel{
    padding:16px 14px;
    margin-bottom:22px;
  }

  .search-box label,
  .result-label,
  .estimate-label{
    font-size:11px;
  }

  #carSearch,
  select{
    padding:12px 13px;
    font-size:14px;
  }

  .search-result-item{
    font-size:13px;
    padding:11px 13px;
  }

  .select-note{
    font-size:12px;
  }

  #result{
    padding:22px 16px;
  }

  #result h3{
    font-size:17px;
  }

  .car-name{
    font-size:20px;
  }

  .car-size{
    font-size:12px;
    padding:6px 13px;
  }

  .result-section{
    margin-top:24px;
  }

  .result-value{
    font-size:16px;
  }

  .result-price{
    font-size:32px;
  }

  #optionArea{
    padding:18px 14px;
  }

  #optionArea h3{
    font-size:17px;
  }

  #optionArea label{
    font-size:13px;
  }

  .total-card{
    padding:22px 16px;
    margin-top:24px;
  }

  .total-card .result-label{
    font-size:12px;
  }

  .total-card .result-price{
    font-size:34px;
    line-height:1.25;
  }

  .estimate-card{
    padding:22px 16px;
  }

  .estimate-title{
    font-size:19px;
  }

  .estimate-value{
    font-size:15px;
  }

  .estimate-total{
    font-size:23px;
  }

  .contact-note{
    font-size:13px;
  }

  .contact-subnote,
  .copy-message{
    font-size:12px;
  }

  .copy-button,
  .line-button{
    font-size:14px;
    padding:14px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="shop-name">RACY'SPEED</div>

<div class="section-en">PRICE</div>

<h2>料金シミュレーター</h2>

<p class="subtitle">
お車に合わせた施工料金をご確認いただけます
</p>

<div class="search-panel">

  <div class="search-box">
    <label>車種名で検索</label>
    <input
      id="carSearch"
      type="text"
      placeholder="例：ぷり、アルファード、BMW X3、ベンツ"
    >
    <div id="searchResults" class="search-results"></div>
  </div>

  <div class="select-note">
    またはメーカーから選択
  </div>

  <select id="makerSelect">
    <option value="">メーカーを選択</option>
  </select>

  <select id="carSelect">
    <option value="">車種を選択</option>
  </select>

</div>

<div id="result"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://klfijtvnbgdkqcslntsp.supabase.co";
const supabaseKey = "sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";
const lineUrl = "https://lin.ee/2ESfOqD";

const supabase = createClient(supabaseUrl, supabaseKey);

const makerSelect = document.getElementById("makerSelect");
const select = document.getElementById("carSelect");
const result = document.getElementById("result");
const carSearch = document.getElementById("carSearch");
const searchResults = document.getElementById("searchResults");

const { data, error } = await supabase
  .from("cars")
  .select("*")
  .order("maker");

if (error) {
  select.innerHTML = '<option>読込エラー</option>';
  console.error(error);
} else {
  const cars = data;

  function formatMenuName(name) {
    return String(name).replaceAll("2層研磨", "2周研磨");
  }

  function toKatakana(str) {
    return str.replace(/[ぁ-ん]/g, function(char) {
      return String.fromCharCode(
        char.charCodeAt(0) + 0x60
      );
    });
  }

  function toHalfWidth(str) {
    return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(char) {
      return String.fromCharCode(
        char.charCodeAt(0) - 0xFEE0
      );
    });
  }

  function normalizeText(str) {
    return toHalfWidth(
      toKatakana(String(str))
    )
      .toLowerCase()
      .replace(/[・\s　\-\_\.\/／]/g, "")
      .replace(/[（）\(\)]/g, "");
  }

  function getAliasWords(car) {
    const words = [];

    if (car.maker === "メルセデス・ベンツ") {
      words.push("ベンツ", "benz", "mercedes", "mercedesbenz", "mb");
    }

    if (car.maker === "フォルクスワーゲン") {
      words.push("vw", "volkswagen", "ワーゲン");
    }

    if (car.maker === "レクサス") words.push("lexus");
    if (car.maker === "トヨタ") words.push("toyota");
    if (car.maker === "ホンダ") words.push("honda");
    if (car.maker === "日産") words.push("nissan");
    if (car.maker === "マツダ") words.push("mazda");
    if (car.maker === "スバル") words.push("subaru");
    if (car.maker === "スズキ") words.push("suzuki");
    if (car.maker === "ダイハツ") words.push("daihatsu");
    if (car.maker === "三菱") words.push("mitsubishi");
    if (car.maker === "テスラ") words.push("tesla");
    if (car.maker === "ポルシェ") words.push("porsche");
    if (car.maker === "アウディ") words.push("audi");
    if (car.maker === "ボルボ") words.push("volvo");
    if (car.maker === "ジープ") words.push("jeep");
    if (car.maker === "シボレー") words.push("chevrolet");
    if (car.maker === "キャデラック") words.push("cadillac");
    if (car.maker === "ランドローバー") words.push("landrover", "rangerover");

    if (car.model === "プリウス") words.push("prius");
    if (car.model === "アルファード") words.push("alphard", "アル");
    if (car.model === "ヴェルファイア") words.push("vellfire");
    if (car.model === "ハイエース") words.push("hiace");
    if (car.model === "ランドクルーザー250" || car.model === "ランドクルーザー300") {
      words.push("ランクル", "landcruiser");
    }

    return words;
  }

  function getSearchText(car) {
    return normalizeText([
      car.maker,
      car.model,
      `${car.maker}${car.model}`,
      ...getAliasWords(car)
    ].join(" "));
  }

  function getSearchScore(car, keyword) {
    const maker = normalizeText(car.maker);
    const model = normalizeText(car.model);
    const makerModel = normalizeText(`${car.maker}${car.model}`);
    const searchText = getSearchText(car);

    if (model === keyword) return 100;
    if (makerModel === keyword) return 95;
    if (model.startsWith(keyword)) return 90;
    if (makerModel.startsWith(keyword)) return 85;
    if (maker.startsWith(keyword)) return 80;
    if (searchText.includes(keyword)) return 60;

    return 0;
  }

  const makers = [...new Set(cars.map(car => car.maker))];

  makerSelect.innerHTML =
    '<option value="">メーカーを選択</option>';

  makers.forEach(maker => {
    const option = document.createElement("option");
    option.value = maker;
    option.textContent = maker;
    makerSelect.appendChild(option);
  });

  function populateCarsByMaker(maker) {
    select.innerHTML =
      '<option value="">車種を選択</option>';

    cars
      .filter(car => car.maker === maker)
      .forEach(car => {
        const option = document.createElement("option");

        option.value = car.model;
        option.textContent = car.model;
        option.dataset.size = car.size;
        option.dataset.maker = car.maker;

        select.appendChild(option);
      });
  }

  function showCar(car) {
    carSearch.value = `${car.maker} ${car.model}`;
    searchResults.innerHTML = "";
    searchResults.style.display = "none";

    makerSelect.value = car.maker;
    populateCarsByMaker(car.maker);

    select.value = car.model;

    result.innerHTML = `
      <h3>お選びのお車</h3>

      <div class="car-name">
        ${car.maker} ${car.model}
      </div>

      <div class="car-size">
        ${car.size}サイズ
      </div>

      <br>

      <label>施工カテゴリ</label>
      <select id="categorySelect">
        <option value="">選択してください</option>
        <option value="wash">洗車</option>
        <option value="coating">コーティング</option>
      </select>

      <br><br>

      <select id="menuSelect">
        <option value="">メニューを選択</option>
      </select>

      <div id="optionArea"></div>
      <div id="priceResult"></div>
    `;

    loadMenus(car.size);
  }

  makerSelect.addEventListener("change", function() {
    const selectedMaker = this.value;

    populateCarsByMaker(selectedMaker);
    result.innerHTML = "";
    carSearch.value = "";
    searchResults.innerHTML = "";
    searchResults.style.display = "none";
  });

  select.addEventListener("change", function() {
    const option = this.selectedOptions[0];

    if (!option.value) {
      result.innerHTML = "";
      return;
    }

    const car = cars.find(item =>
      item.maker === option.dataset.maker &&
      item.model === option.value
    );

    if (car) {
      showCar(car);
    }
  });

  carSearch.addEventListener("input", function() {
    const rawKeyword = this.value.trim();
    const keyword = normalizeText(rawKeyword);

    searchResults.innerHTML = "";

    if (!keyword) {
      searchResults.style.display = "none";
      return;
    }

    const keywords =
      rawKeyword
        .split(/\s+/)
        .map(word => normalizeText(word))
        .filter(Boolean);

    const effectiveKeywords =
      keywords.length ? keywords : [keyword];

    const matchedCars =
      cars
        .map(car => {
          const searchText = getSearchText(car);

          const isMatch =
            effectiveKeywords.every(word =>
              searchText.includes(word)
            ) || searchText.includes(keyword);

          if (!isMatch) {
            return null;
          }

          const score =
            Math.max(
              getSearchScore(car, keyword),
              ...effectiveKeywords.map(word =>
                getSearchScore(car, word)
              )
            );

          return {
            car,
            score
          };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (b.score !== a.score) {
            return b.score - a.score;
          }

          return `${a.car.maker}${a.car.model}`
            .localeCompare(
              `${b.car.maker}${b.car.model}`,
              "ja"
            );
        })
        .slice(0, 20)
        .map(item => item.car);

    if (!matchedCars.length) {
      searchResults.innerHTML =
        '<div class="search-result-item">該当する車種がありません</div>';
      searchResults.style.display = "block";
      return;
    }

    matchedCars.forEach(car => {
      const item = document.createElement("div");

      item.className = "search-result-item";

      item.textContent =
        `${car.maker} ${car.model}／${car.size}サイズ`;

      item.addEventListener("click", function() {
        showCar(car);
      });

      searchResults.appendChild(item);
    });

    searchResults.style.display = "block";
  });

  async function loadMenus(size) {
    const menuSelect = document.getElementById("menuSelect");

    const { data: menus } = await supabase
      .from("menus")
      .select("*");

    menus.sort((a, b) => {
      const order = {
        "純水手洗い洗車": 1,
        "徹底洗車": 2,
        "徹底洗車ライト": 3,
        "MIYABI+OVER COAT（研磨なし）": 4,
        "MIYABI+OVER COAT（軽研磨）": 5,
        "MIYABI+OVER COAT（2層研磨）": 6,
        "MIYABI+ISM（研磨なし）": 7,
        "MIYABI+ISM（軽研磨）": 8,
        "MIYABI+ISM（2層研磨）": 9,
        "MIYABI+IZM（研磨なし）": 10,
        "MIYABI+IZM（軽研磨）": 11,
        "MIYABI+IZM（2層研磨）": 12
      };

      return (order[a.menu_name] || 999) - (order[b.menu_name] || 999);
    });

    const categorySelect = document.getElementById("categorySelect");

    categorySelect.addEventListener("change", function() {
      menuSelect.innerHTML =
        '<option value="">メニューを選択</option>';

      document.getElementById("optionArea").innerHTML = "";
      document.getElementById("priceResult").innerHTML = "";

      const selectedCategory = this.value;

      const filteredMenus = menus.filter(
        menu => menu.category === selectedCategory
      );

      filteredMenus.forEach(menu => {
        const option = document.createElement("option");
        option.value = menu.menu_name;
        option.textContent = formatMenuName(menu.menu_name);
        menuSelect.appendChild(option);
      });
    });

    menuSelect.addEventListener("change", async function() {
      const selectedSize =
        document.querySelector(".car-size")
          .textContent
          .replace("サイズ", "")
          .trim();

      const carName =
        document.querySelector(".car-name")
          .textContent
          .trim();

      const menuName = this.value;
      const displayMenuName = formatMenuName(menuName);

      if (!menuName) return;

      const { data: prices } = await supabase
        .from("prices")
        .select("*")
        .eq("menu_name", menuName)
        .eq("size", selectedSize);

      if (!prices || !prices.length) {
        document.getElementById("priceResult").innerHTML =
          "<br>料金未設定";
        return;
      }

      const { data: menuData } = await supabase
        .from("menus")
        .select("*")
        .eq("menu_name", menuName);

      const { data: options } = await supabase
        .from("options")
        .select("*")
        .eq("size", selectedSize);

      const optionArea =
        document.getElementById("optionArea");

      optionArea.innerHTML =
        "<h3>追加オプション</h3>";

      options.forEach(option => {
        optionArea.innerHTML += `
          <label>
            <input
              type="checkbox"
              class="optionCheck"
              data-price="${option.price}"
              data-name="${option.option_name}"
            >
            ${option.option_name}
            （${option.price.toLocaleString()}円）
          </label>
        `;
      });

      document.getElementById("priceResult").innerHTML = `
        <div class="result-divider"></div>

        <div class="result-section">
          <div class="result-label">
            施工メニュー
          </div>

          <div class="result-value">
            ${displayMenuName}
          </div>
        </div>

        <div class="result-section">
          <div class="result-label">
            施工料金
          </div>

          <div class="result-value">
            ${prices[0].price.toLocaleString()}円
          </div>
        </div>

        <div class="result-section">
          <div class="result-label">
            選択オプション
          </div>

          <div
            id="selectedOptionsResult"
            class="result-value"
          >
            なし
          </div>
        </div>

        <div class="result-section">
          <div class="result-label">
            オプション合計
          </div>

          <div
            id="optionTotalResult"
            class="result-value"
          >
            0円
          </div>
        </div>

        <div class="total-card">
          <div class="result-label">
            お支払い総額
          </div>

          <div
            id="totalPrice"
            class="result-price"
          >
            ${prices[0].price.toLocaleString()}円
          </div>

          <div class="info">
            （税込）
          </div>
        </div>

        <div class="estimate-card">
          <div class="estimate-title">
            お見積り内容
          </div>

          <div class="estimate-row">
            <div class="estimate-label">
              お車
            </div>
            <div class="estimate-value">
              ${carName}
            </div>
          </div>

          <div class="estimate-row">
            <div class="estimate-label">
              サイズ
            </div>
            <div class="estimate-value">
              ${selectedSize}サイズ
            </div>
          </div>

          <div class="estimate-row">
            <div class="estimate-label">
              施工メニュー
            </div>
            <div class="estimate-value">
              ${displayMenuName}
            </div>
          </div>

          <div class="estimate-row">
            <div class="estimate-label">
              選択オプション
            </div>
            <div
              id="estimateOptions"
              class="estimate-value"
            >
              なし
            </div>
          </div>

          <div class="estimate-row">
            <div class="estimate-label">
              お支払い総額
            </div>
            <div
              id="estimateTotal"
              class="estimate-total"
            >
              ${prices[0].price.toLocaleString()}円（税込）
            </div>
          </div>

          <div class="estimate-actions">

            <p class="contact-note">
              内容をご確認のうえ、ご相談・ご予約をご希望の方はLINEよりお問い合わせください。
            </p>

            <p class="contact-subnote">
              ※この時点では予約確定ではありません。
            </p>

            <button
              id="copyEstimateBtn"
              class="copy-button"
              type="button"
            >
              お見積り内容をコピー
            </button>

            <a
              id="lineContactBtn"
              class="line-button"
              href="${lineUrl}"
              target="_blank"
              rel="noopener"
            >
              この内容でLINE問い合わせ
            </a>

            <div
              id="copyMessage"
              class="copy-message"
            ></div>

          </div>
        </div>

        <div class="result-section">
          <div class="result-label">
            施工時間
          </div>

          <div class="result-value">
            ${menuData[0].work_time}
          </div>
        </div>
      `;

      const basePrice = prices[0].price;
      let currentEstimateText = "";

      function updateTotal() {
        let optionTotal = 0;
        let selectedOptions = [];

        document
          .querySelectorAll(".optionCheck:checked")
          .forEach(check => {
            optionTotal += Number(check.dataset.price);
            selectedOptions.push(check.dataset.name);
          });

        const selectedOptionsText =
          selectedOptions.length
            ? selectedOptions.join("<br>")
            : "なし";

        const selectedOptionsCopyText =
          selectedOptions.length
            ? selectedOptions.map(name => `・${name}`).join("\\n")
            : "なし";

        const totalPrice =
          basePrice + optionTotal;

        document.getElementById("optionTotalResult").textContent =
          `${optionTotal.toLocaleString()}円`;

        document.getElementById("totalPrice").textContent =
          `${totalPrice.toLocaleString()}円`;

        document.getElementById("selectedOptionsResult").innerHTML =
          selectedOptionsText;

        document.getElementById("estimateOptions").innerHTML =
          selectedOptionsText;

        document.getElementById("estimateTotal").textContent =
          `${totalPrice.toLocaleString()}円（税込）`;

        currentEstimateText =
`RACY'SPEED お見積り内容

お車：${carName}
サイズ：${selectedSize}サイズ

施工メニュー：
${displayMenuName}

選択オプション：
${selectedOptionsCopyText}

お支払い総額：
${totalPrice.toLocaleString()}円（税込）

施工時間：
${menuData[0].work_time}

この内容で問い合わせ希望です。`;
      }

      document
        .querySelectorAll(".optionCheck")
        .forEach(check => {
          check.addEventListener("change", updateTotal);
        });

      document
        .getElementById("copyEstimateBtn")
        .addEventListener("click", async function() {
          const copyMessage =
            document.getElementById("copyMessage");

          try {
            await navigator.clipboard.writeText(currentEstimateText);
            copyMessage.textContent =
              "お見積り内容をコピーしました。LINEで貼り付けて送信できます。";
          } catch (error) {
            copyMessage.textContent =
              "コピーできませんでした。画面のお見積り内容を選択してコピーしてください。";
          }
        });

      updateTotal();
    });
  }
}
</script>

</body>
</html>
