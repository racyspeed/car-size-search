<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>料金シミュレーター｜RACY'SPEED</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Shippori Mincho', serif;
  background:#f4f4f2;
  padding:30px 16px;
  color:#111;
}

.container{
  max-width:760px;
  margin:auto;
  background:#fff;
  padding:46px;
  border:1px solid #d8d8d8;
  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.shop-name{
  text-align:center;
  font-size:18px;
  letter-spacing:0.08em;
  font-weight:700;
  margin-bottom:26px;
}

.section-en{
  text-align:center;
  font-size:52px;
  font-weight:700;
  line-height:1;
  margin-bottom:14px;
}

h2{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#555;
  margin-bottom:34px;
  font-size:14px;
}

.search-box{
  margin-bottom:24px;
}

.search-box label{
  display:block;
  font-size:13px;
  color:#666;
  letter-spacing:0.12em;
  font-weight:700;
  margin-bottom:8px;
}

#carSearch{
  width:100%;
  padding:16px;
  border:1px solid #cfcfcf;
  font-family:'Shippori Mincho', serif;
  font-size:16px;
  box-sizing:border-box;
}

#carSearch:focus{
  outline:none;
  border-color:#111;
}

.search-results{
  margin-top:8px;
  border:1px solid #ddd;
  background:#fff;
  display:none;
}

.search-result-item{
  padding:13px 15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  font-size:15px;
}

.search-result-item:hover{
  background:#f5f5f5;
}

.search-result-item:last-child{
  border-bottom:none;
}

.select-note{
  text-align:center;
  margin:20px 0;
  color:#777;
  font-size:13px;
}

select{
  width:100%;
  padding:16px;
  margin-bottom:16px;
  border:1px solid #cfcfcf;
  border-radius:0;
  font-family:'Shippori Mincho', serif;
  font-size:16px;
  background:#fff;
}

select:focus{
  outline:none;
  border-color:#111;
}

#result{
  margin-top:34px;
  padding:34px;
  background:#fff;
  border:1px solid #ddd;
}

.car-name{
  font-size:25px;
  font-weight:700;
  margin-bottom:12px;
}

.car-size{
  display:inline-block;
  padding:7px 16px;
  background:#111;
  color:#fff;
  font-size:14px;
  font-weight:600;
  margin-bottom:24px;
}

.result-section{
  margin-top:30px;
}

.result-label{
  font-size:13px;
  color:#666;
  letter-spacing:0.12em;
  margin-bottom:8px;
  font-weight:700;
}

.result-value{
  font-size:19px;
  font-weight:600;
  line-height:1.8;
}

.result-price{
  font-size:44px;
  font-weight:700;
}

.result-divider{
  height:1px;
  background:#ddd;
  margin:26px 0;
}

.info{
  margin-top:8px;
  color:#666;
  font-size:14px;
}

#optionArea{
  margin-top:30px;
  padding:24px;
  border:1px solid #ddd;
  background:#fafafa;
}

#optionArea h3{
  margin-top:0;
  margin-bottom:18px;
  font-size:20px;
  font-weight:700;
}

#optionArea label{
  display:block;
  margin:12px 0;
  font-size:15px;
  line-height:1.6;
}

.optionCheck{
  margin-right:8px;
}

.total-card{
  margin-top:28px;
  padding:30px 24px;
  background:#050505;
  color:#fff;
  text-align:center;
}

.total-card .result-label{
  color:#fff;
  font-size:15px;
  letter-spacing:0.16em;
}

.total-card .result-price{
  color:#fff;
  font-size:64px;
  margin-top:12px;
}

.total-card .info{
  color:#ddd;
}

.estimate-card{
  margin-top:34px;
  padding:30px;
  border:1px solid #d8d8d8;
  background:#fff;
}

.estimate-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:24px;
  text-align:center;
}

.estimate-row{
  border-top:1px solid #e5e5e5;
  padding:18px 0;
}

.estimate-label{
  font-size:13px;
  color:#666;
  letter-spacing:0.12em;
  font-weight:700;
  margin-bottom:8px;
}

.estimate-value{
  font-size:18px;
  font-weight:600;
  line-height:1.8;
}

.estimate-total{
  font-size:32px;
  font-weight:700;
}

.estimate-actions{
  margin-top:28px;
  display:flex;
  gap:12px;
  flex-direction:column;
}

.contact-note{
  margin:0;
  font-size:15px;
  line-height:1.8;
  text-align:center;
  color:#222;
}

.contact-subnote{
  margin:8px 0 16px;
  font-size:13px;
  line-height:1.6;
  text-align:center;
  color:#777;
}

.copy-button,
.line-button{
  display:block;
  width:100%;
  padding:16px;
  text-align:center;
  font-family:'Shippori Mincho', serif;
  font-size:16px;
  font-weight:700;
  text-decoration:none;
  cursor:pointer;
  box-sizing:border-box;
}

.copy-button{
  background:#fff;
  color:#111;
  border:1px solid #111;
}

.line-button{
  background:#06c755;
  color:#fff;
  border:1px solid #06c755;
}

.copy-message{
  margin-top:10px;
  font-size:14px;
  color:#555;
  text-align:center;
}

@media(max-width:600px){
  .container{
    padding:28px 20px;
  }

  .section-en{
    font-size:38px;
  }

  .result-price{
    font-size:36px;
  }

  .total-card .result-price{
    font-size:46px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="shop-name">RACY'SPEED</div>

<div class="section-en">PRICE</div>

<h2>料金シミュレーター</h2>

<p class="subtitle">
お車に合わせた施工料金をご確認いただけます
</p>

<div class="search-box">
  <label>車種名で検索</label>
  <input
    id="carSearch"
    type="text"
    placeholder="例：プリウス、アルファード、BMW X3"
  >
  <div id="searchResults" class="search-results"></div>
</div>

<div class="select-note">
  またはメーカーから選択
</div>

<select id="makerSelect">
  <option value="">メーカーを選択</option>
</select>

<select id="carSelect">
  <option value="">車種を選択</option>
</select>

<div id="result"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://klfijtvnbgdkqcslntsp.supabase.co";
const supabaseKey = "sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";
const lineUrl = "https://lin.ee/2ESfOqD";

const supabase = createClient(supabaseUrl, supabaseKey);

const makerSelect = document.getElementById("makerSelect");
const select = document.getElementById("carSelect");
const result = document.getElementById("result");
const carSearch = document.getElementById("carSearch");
const searchResults = document.getElementById("searchResults");

const { data, error } = await supabase
  .from("cars")
  .select("*")
  .order("maker");

if (error) {
  select.innerHTML = '<option>読込エラー</option>';
  console.error(error);
} else {
  const cars = data;

  const makers = [...new Set(cars.map(car => car.maker))];

  makerSelect.innerHTML =
    '<option value="">メーカーを選択</option>';

  makers.forEach(maker => {
    const option = document.createElement("option");
    option.value = maker;
    option.textContent = maker;
    makerSelect.appendChild(option);
  });

  function populateCarsByMaker(maker) {
    select.innerHTML =
      '<option value="">車種を選択</option>';

    cars
      .filter(car => car.maker === maker)
      .forEach(car => {
        const option = document.createElement("option");

        option.value = car.model;
        option.textContent = car.model;
        option.dataset.size = car.size;
        option.dataset.maker = car.maker;

        select.appendChild(option);
      });
  }

  function showCar(car) {
    carSearch.value = `${car.maker} ${car.model}`;
    searchResults.innerHTML = "";
    searchResults.style.display = "none";

    makerSelect.value = car.maker;
    populateCarsByMaker(car.maker);

    select.value = car.model;

    result.innerHTML = `
      <h3>お選びのお車</h3>

      <div class="car-name">
        ${car.maker} ${car.model}
      </div>

      <div class="car-size">
        ${car.size}サイズ
      </div>

      <br>

      <label>施工カテゴリ</label>
      <select id="categorySelect">
        <option value="">選択してください</option>
        <option value="wash">洗車</option>
        <option value="coating">コーティング</option>
      </select>

      <br><br>

      <select id="menuSelect">
        <option value="">メニューを選択</option>
      </select>

      <div id="optionArea"></div>
      <div id="priceResult"></div>
    `;

    loadMenus(car.size);
  }

  makerSelect.addEventListener("change", function() {
    const selectedMaker = this.value;

    populateCarsByMaker(selectedMaker);
    result.innerHTML = "";
    carSearch.value = "";
    searchResults.innerHTML = "";
    searchResults.style.display = "none";
  });

  select.addEventListener("change", function() {
    const option = this.selectedOptions[0];

    if (!option.value) {
      result.innerHTML = "";
      return;
    }

    const car = cars.find(item =>
      item.maker === option.dataset.maker &&
      item.model === option.value
    );

    if (car) {
      showCar(car);
    }
  });

  carSearch.addEventListener("input", function() {
    const keyword =
      this.value
        .trim()
        .toLowerCase();

    searchResults.innerHTML = "";

    if (!keyword) {
      searchResults.style.display = "none";
      return;
    }

    const keywords =
      keyword
        .split(/\s+/)
        .filter(Boolean);

    const matchedCars =
      cars
        .filter(car => {
          const text =
            `${car.maker} ${car.model}`
              .toLowerCase();

          return keywords.every(word =>
            text.includes(word)
          );
        })
        .slice(0, 20);

    if (!matchedCars.length) {
      searchResults.innerHTML =
        '<div class="search-result-item">該当する車種がありません</div>';
      searchResults.style.display = "block";
      return;
    }

    matchedCars.forEach(car => {
      const item =
        document.createElement("div");

      item.className =
        "search-result-item";

      item.textContent =
        `${car.maker} ${car.model}／${car.size}サイズ`;

      item.addEventListener("click", function() {
        showCar(car);
      });

      searchResults.appendChild(item);
    });

    searchResults.style.display = "block";
  });
}

async function loadMenus(size) {
  const menuSelect = document.getElementById("menuSelect");

  const { data: menus } = await supabase
    .from("menus")
    .select("*");

  menus.sort((a, b) => {
    const order = {
      "純水手洗い洗車": 1,
      "徹底洗車": 2,
      "徹底洗車ライト": 3,
      "MIYABI+OVER COAT（研磨なし）": 4,
      "MIYABI+OVER COAT（軽研磨）": 5,
      "MIYABI+OVER COAT（2層研磨）": 6,
      "MIYABI+ISM（研磨なし）": 7,
      "MIYABI+ISM（軽研磨）": 8,
      "MIYABI+ISM（2層研磨）": 9,
      "MIYABI+IZM（研磨なし）": 10,
      "MIYABI+IZM（軽研磨）": 11,
      "MIYABI+IZM（2層研磨）": 12
    };

    return (order[a.menu_name] || 999) - (order[b.menu_name] || 999);
  });

  const categorySelect = document.getElementById("categorySelect");

  categorySelect.addEventListener("change", function() {
    menuSelect.innerHTML =
      '<option value="">メニューを選択</option>';

    document.getElementById("optionArea").innerHTML = "";
    document.getElementById("priceResult").innerHTML = "";

    const selectedCategory = this.value;

    const filteredMenus = menus.filter(
      menu => menu.category === selectedCategory
    );

    filteredMenus.forEach(menu => {
      const option = document.createElement("option");
      option.value = menu.menu_name;
      option.textContent = menu.menu_name;
      menuSelect.appendChild(option);
    });
  });

  menuSelect.addEventListener("change", async function() {
    const selectedSize =
      document.querySelector(".car-size")
        .textContent
        .replace("サイズ", "")
        .trim();

    const carName =
      document.querySelector(".car-name")
        .textContent
        .trim();

    const menuName = this.value;

    if (!menuName) return;

    const { data: prices } = await supabase
      .from("prices")
      .select("*")
      .eq("menu_name", menuName)
      .eq("size", selectedSize);

    if (!prices || !prices.length) {
      document.getElementById("priceResult").innerHTML =
        "<br>料金未設定";
      return;
    }

    const { data: menuData } = await supabase
      .from("menus")
      .select("*")
      .eq("menu_name", menuName);

    const { data: options } = await supabase
      .from("options")
      .select("*")
      .eq("size", selectedSize);

    const optionArea =
      document.getElementById("optionArea");

    optionArea.innerHTML =
      "<h3>追加オプション</h3>";

    options.forEach(option => {
      optionArea.innerHTML += `
        <label>
          <input
            type="checkbox"
            class="optionCheck"
            data-price="${option.price}"
            data-name="${option.option_name}"
          >
          ${option.option_name}
          （${option.price.toLocaleString()}円）
        </label>
      `;
    });

    document.getElementById("priceResult").innerHTML = `
      <div class="result-divider"></div>

      <div class="result-section">
        <div class="result-label">
          施工メニュー
        </div>

        <div class="result-value">
          ${menuName}
        </div>
      </div>

      <div class="result-section">
        <div class="result-label">
          施工料金
        </div>

        <div class="result-value">
          ${prices[0].price.toLocaleString()}円
        </div>
      </div>

      <div class="result-section">
        <div class="result-label">
          選択オプション
        </div>

        <div
          id="selectedOptionsResult"
          class="result-value"
        >
          なし
        </div>
      </div>

      <div class="result-section">
        <div class="result-label">
          オプション合計
        </div>

        <div
          id="optionTotalResult"
          class="result-value"
        >
          0円
        </div>
      </div>

      <div class="total-card">
        <div class="result-label">
          お支払い総額
        </div>

        <div
          id="totalPrice"
          class="result-price"
        >
          ${prices[0].price.toLocaleString()}円
        </div>

        <div class="info">
          （税込）
        </div>
      </div>

      <div class="estimate-card">
        <div class="estimate-title">
          お見積り内容
        </div>

        <div class="estimate-row">
          <div class="estimate-label">
            お車
          </div>
          <div class="estimate-value">
            ${carName}
          </div>
        </div>

        <div class="estimate-row">
          <div class="estimate-label">
            サイズ
          </div>
          <div class="estimate-value">
            ${selectedSize}サイズ
          </div>
        </div>

        <div class="estimate-row">
          <div class="estimate-label">
            施工メニュー
          </div>
          <div class="estimate-value">
            ${menuName}
          </div>
        </div>

        <div class="estimate-row">
          <div class="estimate-label">
            選択オプション
          </div>
          <div
            id="estimateOptions"
            class="estimate-value"
          >
            なし
          </div>
        </div>

        <div class="estimate-row">
          <div class="estimate-label">
            お支払い総額
          </div>
          <div
            id="estimateTotal"
            class="estimate-total"
          >
            ${prices[0].price.toLocaleString()}円（税込）
          </div>
        </div>

        <div class="estimate-actions">

          <p class="contact-note">
            内容をご確認のうえ、ご相談・ご予約をご希望の方はLINEよりお問い合わせください。
          </p>

          <p class="contact-subnote">
            ※この時点では予約確定ではありません。
          </p>

          <button
            id="copyEstimateBtn"
            class="copy-button"
            type="button"
          >
            お見積り内容をコピー
          </button>

          <a
            id="lineContactBtn"
            class="line-button"
            href="${lineUrl}"
            target="_blank"
            rel="noopener"
          >
            この内容でLINE問い合わせ
          </a>

          <div
            id="copyMessage"
            class="copy-message"
          ></div>

        </div>
      </div>

      <div class="result-section">
        <div class="result-label">
          施工時間
        </div>

        <div class="result-value">
          ${menuData[0].work_time}
        </div>
      </div>
    `;

    const basePrice = prices[0].price;
    let currentEstimateText = "";

    function updateTotal() {
      let optionTotal = 0;
      let selectedOptions = [];

      document
        .querySelectorAll(".optionCheck:checked")
        .forEach(check => {
          optionTotal += Number(check.dataset.price);
          selectedOptions.push(check.dataset.name);
        });

      const selectedOptionsText =
        selectedOptions.length
          ? selectedOptions.join("<br>")
          : "なし";

      const selectedOptionsCopyText =
        selectedOptions.length
          ? selectedOptions.map(name => `・${name}`).join("\\n")
          : "なし";

      const totalPrice =
        basePrice + optionTotal;

      document.getElementById("optionTotalResult").textContent =
        `${optionTotal.toLocaleString()}円`;

      document.getElementById("totalPrice").textContent =
        `${totalPrice.toLocaleString()}円`;

      document.getElementById("selectedOptionsResult").innerHTML =
        selectedOptionsText;

      document.getElementById("estimateOptions").innerHTML =
        selectedOptionsText;

      document.getElementById("estimateTotal").textContent =
        `${totalPrice.toLocaleString()}円（税込）`;

      currentEstimateText =
`RACY'SPEED お見積り内容

お車：${carName}
サイズ：${selectedSize}サイズ

施工メニュー：
${menuName}

選択オプション：
${selectedOptionsCopyText}

お支払い総額：
${totalPrice.toLocaleString()}円（税込）

施工時間：
${menuData[0].work_time}

この内容で問い合わせ希望です。`;
    }

    document
      .querySelectorAll(".optionCheck")
      .forEach(check => {
        check.addEventListener("change", updateTotal);
      });

    document
      .getElementById("copyEstimateBtn")
      .addEventListener("click", async function() {
        const copyMessage =
          document.getElementById("copyMessage");

        try {
          await navigator.clipboard.writeText(currentEstimateText);
          copyMessage.textContent =
            "お見積り内容をコピーしました。LINEで貼り付けて送信できます。";
        } catch (error) {
          copyMessage.textContent =
            "コピーできませんでした。画面のお見積り内容を選択してコピーしてください。";
        }
      });

    updateTotal();
  });
}
</script>

</body>
</html>
