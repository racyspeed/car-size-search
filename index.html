<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>車両サイズ検索</title>
  <style>

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fa;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:24px;
  box-shadow:0 12px 35px rgba(0,0,0,0.06);
}

h2{
  text-align:center;
  margin-bottom:10px;
  font-size:32px;
  font-weight:700;
  color:#222;
}

select{
  width:100%;
  padding:16px;
  margin-bottom:15px;
  border:1px solid #dcdcdc;
  border-radius:12px;
  font-size:16px;
  background:white;
}

#result{
  margin-top:30px;
  padding:30px;
  border-radius:20px;
  background:white;
  border:1px solid #e5e5e5;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.price{
  font-size:42px;
  font-weight:700;
  margin-top:15px;
  letter-spacing:1px;
}

.info{
  margin-top:10px;
  color:#666;
}
.subtitle{
  text-align:center;
  color:#666;
  margin-top:-15px;
  margin-bottom:25px;
  font-size:14px;
}
.car-name{
  font-size:24px;
  font-weight:700;
  margin-bottom:10px;
}

.car-size{
  display:inline-block;
  padding:6px 14px;
  background:#f3f4f6;
  border-radius:999px;
  font-size:14px;
  font-weight:600;
  margin-bottom:20px;
}
  .price-card{
  margin-top:20px;
  padding:25px;
  border-radius:15px;
  background:#fafafa;
  border:1px solid #e5e5e5;
  text-align:center;
}

.price-label{
  font-size:14px;
  color:#888;
  letter-spacing:1px;
}

.price{
  font-size:42px;
  font-weight:700;
  margin:15px 0;
  letter-spacing:1px;
}

.tax{
  color:#666;
  margin-bottom:20px;
}

.worktime-title{
  font-size:14px;
  color:#888;
}

.worktime{
  font-size:18px;
  font-weight:600;
  margin-top:8px;
}
    .result-section{
  margin-top:32px;
}
.result-label{
  font-size:13px;
  color:#777;
  letter-spacing:0.08em;
  margin-bottom:6px;
}

.result-value{
  font-size:20px;
  font-weight:600;
  color:#222;
}

.result-price{
  font-size:48px;
  font-weight:700;
  margin-top:8px;
  color:#111;
}

.result-divider{
  height:1px;
  background:#ececec;
  margin:22px 0;
}
  .shop-name{
  text-align:center;
  font-size:14px;
  letter-spacing:0.25em;
  color:#888;
  margin-bottom:10px;
  font-weight:600;
  text-transform:uppercase;
}
  </style>
</head>
<body>

<div class="container">

<div class="shop-name">
  RACY'SPEED
</div>

<h2>料金シミュレーター</h2>

<p class="subtitle">
お車に合わせた施工料金をご確認いただけます
</p>

<select id="makerSelect">
  <option value="">メーカーを選択</option>
</select>

<select id="carSelect">
  <option value="">車種を選択</option>
</select>

<div id="result"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://klfijtvnbgdkqcslntsp.supabase.co";
const supabaseKey = "sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";

const supabase = createClient(supabaseUrl, supabaseKey);

const makerSelect = document.getElementById("makerSelect");
const select = document.getElementById("carSelect");
const result = document.getElementById("result");

const { data, error } = await supabase
  .from("cars")
  .select("*")
  .order("maker");

if (error) {
  select.innerHTML = '<option>読込エラー</option>';
  console.error(error);

} else {

  const makers = [...new Set(data.map(car => car.maker))];

  makerSelect.innerHTML =
    '<option value="">メーカーを選択</option>';

  makers.forEach(maker => {
    const option = document.createElement("option");
    option.value = maker;
    option.textContent = maker;
    makerSelect.appendChild(option);
  });

  makerSelect.addEventListener("change", function() {

    const selectedMaker = this.value;

    select.innerHTML =
      '<option value="">車種を選択</option>';

    result.innerHTML = "";

    data
      .filter(car => car.maker === selectedMaker)
      .forEach(car => {

        const option = document.createElement("option");

        option.value = car.model;
        option.textContent = car.model;
        option.dataset.size = car.size;
        option.dataset.maker = car.maker;

        select.appendChild(option);

      });

  });

}

select.addEventListener("change", function() {
  const option = this.selectedOptions[0];

  if (!option.value) {
    result.innerHTML = "";
    return;
  }

  const size = option.dataset.size;

result.innerHTML = `
  <h3>お選びのお車</h3>

  <div class="car-name">
    ${option.dataset.maker} ${option.textContent}
  </div>

  <div class="car-size">
    ${size}サイズ
  </div>

  <br>

  <label>施工カテゴリ</label>
  <select id="categorySelect">
    <option value="">選択してください</option>
    <option value="wash">洗車</option>
    <option value="coating">コーティング</option>
  </select>

  <br><br>

  <select id="menuSelect">
    <option value="">メニューを選択</option>
  </select>

  <div id="optionArea"></div>
<div id="priceResult"></div>

`;

loadMenus(size);
});
  async function loadMenus(size) {

  const menuSelect = document.getElementById("menuSelect");

  const { data: menus } = await supabase
    .from("menus")
    .select("*");
menus.sort((a, b) => {

  const order = {
    "純水手洗い洗車": 1,
    "徹底洗車": 2,
    "徹底洗車ライト": 3
  };

  return order[a.menu_name] - order[b.menu_name];

});
  const categorySelect = document.getElementById("categorySelect");

categorySelect.addEventListener("change", function () {

  menuSelect.innerHTML =
    '<option value="">選択してください</option>';

  const selectedCategory = this.value;

  const filteredMenus = menus.filter(
    menu => menu.category === selectedCategory
  );

  filteredMenus.forEach(menu => {
    const option = document.createElement("option");
    option.value = menu.menu_name;
    option.textContent = menu.menu_name;
    menuSelect.appendChild(option);
  });

});

  menuSelect.addEventListener("change", async function() {

    const size =
  document.querySelector(".car-size")
    .textContent
    .replace("サイズ", "")
    .trim();
    
const menuName = this.value;

if (!menuName) return;

const { data: prices } = await supabase
.from("prices")
.select("*")
.eq("menu_name", menuName)
.eq("size", size);

if (!prices || !prices.length) {
document.getElementById("priceResult").innerHTML =
"<br>料金未設定";
return;
}

const { data: menuData } = await supabase
.from("menus")
.select("*")
.eq("menu_name", menuName);
const { data: options } = await supabase
  .from("options")
  .select("*")
  .eq("size", size);

const optionArea =
document.getElementById("optionArea");

optionArea.innerHTML =
  "<h3>追加オプション</h3>";

options.forEach(option => {

optionArea.innerHTML += `     <label style="display:block;margin:10px 0;">       <input
        type="checkbox"
        class="optionCheck"       >
      ${option.option_name}
      （${option.price.toLocaleString()}円）     </label>
  `;

});

document.getElementById("priceResult").innerHTML = `

<div class="result-divider"></div>

<div class="result-section">
  <div class="result-label">
    施工メニュー
  </div>

  <div class="result-value">
    ${menuName}
  </div>
</div>

<div class="result-section">
  <div class="result-label">
    施工料金
  </div>

  <div class="result-price">
    ${prices[0].price.toLocaleString()}円
    <div id="totalPrice"></div>
  </div>

  <div class="info">
    （税込）
  </div>
</div>

<div class="result-section">
  <div class="result-label">
    施工時間
  </div>

  <div class="result-value">
    ${menuData[0].work_time}
  </div>
</div>
`;

});


}
</script>

</body>
</html>
