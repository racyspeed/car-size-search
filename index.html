<head>
<meta charset="UTF-8">
<title>料金シミュレーター｜RACY'SPEED</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
.reservation-card{
  margin-top:30px;
  padding:30px;
  border:1px solid #eadfca;
  border-radius:28px;
  background:
    radial-gradient(circle at top left, rgba(212,175,55,.13), transparent 34%),
    linear-gradient(180deg,#ffffff 0%,#fffdf8 48%,#faf7ef 100%);
  box-shadow:0 22px 55px rgba(30,24,14,.10);
  position:relative;
  overflow:hidden;
}
.reservation-card::before{
  content:"";
  position:absolute;
  left:24px;
  right:24px;
  top:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#d4af37,transparent);
}
.reservation-card .estimate-title{
  font-family:'Shippori Mincho', serif;
  letter-spacing:.12em;
  color:#221f1a;
}
.reservation-card .contact-subnote{
  color:#776b5b;
}
.reservation-calendar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:22px 0 14px;
  padding:16px 18px;
  border:1px solid rgba(212,175,55,.45);
  border-radius:22px;
  background:
    linear-gradient(135deg,#1d1a16 0%,#3a3021 52%,#1d1a16 100%);
  color:#fff;
  box-shadow:0 14px 28px rgba(34,25,12,.16);
}
.calendar-month-title{
  font-family:'Shippori Mincho', serif;
  font-size:18px;
  font-weight:700;
  letter-spacing:.18em;
  color:#f8edd1;
  text-shadow:0 1px 0 rgba(0,0,0,.2);
}
.calendar-nav-button{
  cursor:pointer;
  border:1px solid rgba(245,224,170,.55);
  background:rgba(255,255,255,.08);
  color:#f8edd1;
  border-radius:999px;
  padding:9px 15px;
  font-size:12px;
  letter-spacing:.12em;
  font-family:inherit;
  transition:.2s;
}
.calendar-nav-button:hover{
  background:rgba(212,175,55,.20);
  transform:translateY(-1px);
}
.calendar-legend{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:9px 16px;
  margin:14px 0 16px;
  color:#665b4c;
  font-size:12px;
  letter-spacing:.04em;
}
.calendar-legend span{
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.legend-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  display:inline-block;
  box-shadow:0 0 0 3px rgba(212,175,55,.08);
}
.legend-open{background:#d4af37;}
.legend-few{background:#b8872f;}
.legend-full{background:#bdb6aa;}
.legend-closed{background:#f0ece4; border:1px solid #d8d0c2; box-shadow:none;}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:14px;
  border:1px solid #efe5d3;
  border-radius:24px;
  background:rgba(255,255,255,.72);
}
.calendar-weekday{
  text-align:center;
  font-size:12px;
  color:#9a8660;
  padding:8px 0;
  letter-spacing:.12em;
}
.calendar-day{
  min-height:62px;
  border:1px solid #eadfca;
  border-radius:17px;
  background:linear-gradient(180deg,#fff 0%,#fffdf8 100%);
  cursor:pointer;
  font-size:14px;
  font-family:'Shippori Mincho', serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  transition:.18s;
  box-shadow:0 5px 14px rgba(45,34,16,.04);
}
.calendar-day:hover:not(:disabled){
  transform:translateY(-2px);
  border-color:#d4af37;
  box-shadow:0 12px 24px rgba(60,43,15,.12);
}
.calendar-day.empty{
  border:none;
  background:transparent;
  cursor:default;
  box-shadow:none;
}
.calendar-day.closed,
.calendar-day.past,
.calendar-day.unavailable{
  color:#aaa;
  background:#f3f0ea;
  cursor:not-allowed;
  box-shadow:none;
  border-color:#ebe5dc;
}
.calendar-day.available{
  background:linear-gradient(180deg,#fff 0%,#fff8e7 100%);
}
.calendar-day.few{
  background:linear-gradient(180deg,#fff 0%,#fff1d2 100%);
  border-color:#d2aa5a;
}
.calendar-day.selected{
  color:#1f1a12;
  border-color:#d4af37;
  font-weight:700;
  background:linear-gradient(180deg,#fff7df 0%,#f1dfad 100%);
  box-shadow:0 0 0 2px rgba(212,175,55,.42) inset,0 14px 26px rgba(75,55,18,.16);
}
.calendar-day-number{
  font-size:17px;
  line-height:1;
}
.calendar-day-status{
  font-size:11px;
  letter-spacing:.06em;
  color:#7f6a3d;
  white-space:nowrap;
}
.calendar-day.unavailable .calendar-day-status,
.calendar-day.closed .calendar-day-status,
.calendar-day.past .calendar-day-status{
  color:#9c9c9c;
}
.time-slot-area{
  margin-top:20px;
  padding:18px;
  border:1px solid #efe5d3;
  border-radius:22px;
  background:rgba(255,255,255,.74);
}
.time-slot-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}
.time-slot-button{
  cursor:pointer;
  border:1px solid #ddcfb3;
  background:#fff;
  border-radius:999px;
  padding:11px 16px;
  font-size:13px;
  font-family:inherit;
  transition:.18s;
}
.time-slot-button:hover:not(:disabled){
  border-color:#d4af37;
  box-shadow:0 8px 17px rgba(50,35,10,.10);
  transform:translateY(-1px);
}
.time-slot-button.active{
  background:linear-gradient(135deg,#231f19,#3a3021);
  color:#f8edd1;
  border-color:#d4af37;
}
.time-slot-button:disabled{
  color:#aaa;
  background:#f2efe9;
  cursor:not-allowed;
}
.reservation-form{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.reservation-form input,
.reservation-form textarea{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border:1px solid #e0d6c6;
  border-radius:14px;
  font-size:14px;
  font-family:inherit;
  background:#fff;
}
.reservation-form input:focus,
.reservation-form textarea:focus{
  outline:none;
  border-color:#d4af37;
  box-shadow:0 0 0 3px rgba(212,175,55,.13);
}
.reservation-form textarea{
  min-height:88px;
  resize:vertical;
}
.reservation-selected-date{
  margin-top:14px;
  font-weight:700;
  color:#2d2924;
  text-align:center;
}
.total-card-center{
  text-align:center;
}
.total-price-inline{
  display:flex;
  justify-content:center;
  align-items:baseline;
  gap:8px;
  flex-wrap:wrap;
}
.total-price-inline .info{
  margin:0;
}
.option-time-inline{
  display:inline;
  white-space:nowrap;
}
@media (max-width:560px){
  .reservation-card{padding:22px 16px;}
  .reservation-calendar-head{padding:14px 12px;}
  .calendar-month-title{font-size:16px;letter-spacing:.1em;}
  .calendar-nav-button{padding:8px 11px;font-size:11px;}
  .calendar-grid{gap:5px;padding:9px;border-radius:18px;}
  .calendar-day{min-height:52px;border-radius:12px;}
  .calendar-day-status{font-size:10px;}
}

<h2>料金シミュレーター</h2>

      <select id="carSelect">
        <option value="">車種を選択</option>
      </select>
    </div>

  </div>
</div>

  <summary>サイズ区分の目安を見る</summary>

      <div class="size-guide-item"><div class="size-guide-size">XXLサイズ</div>大型ミニバン・大型SUVなど</div>

  </div>
</details>

  function formatMenuName(name) {
    return String(name)
      .replaceAll("2層研磨", "2周研磨")
      .replaceAll("MIYABI+ISM", "MIYABI＋ISM")
      .replaceAll("MIYABI+IZM", "MIYABI＋IZM")
      .replaceAll("MIYABI+OVER COAT", "MIYABI＋OVER COAT");
  }

  function getBrandType(menuName) {
    if (menuName.includes("ISM")) return "ism";
    if (menuName.includes("IZM")) return "izm";
    if (menuName.includes("OVER COAT")) return "over";
    return "other";
  }

  function getBrandInfo(type) {
    if (type === "ism") {
      return {
        sub:"MIYABI＋",
        main:"ISM",
        coat:"COAT",
        desc:"深い艶と優れた撥水性を両立したハイグレードコーティング",
        className:"brand-ism"
      };
    }

    if (type === "izm") {
      return {
        sub:"MIYABI＋",
        main:"IZM",
        coat:"COAT",
        desc:"圧倒的な艶と強靭な被膜で愛車を守るプレミアムコーティング",
        className:"brand-izm"
      };
    }

    return {
      sub:"MIYABI＋",
      main:"OVER COAT",
      coat:"SEALANT",
      desc:"コーティング被膜を保護し、美しさを長く維持するためのシーラントコーティング",
      className:"brand-over"
    };
  }

  function getPlanLabel(menuName) {
    const name = formatMenuName(menuName);
    if (name.includes("研磨なし")) return "研磨なし";
    if (name.includes("軽研磨")) return "軽研磨";
    if (name.includes("2周研磨")) return "2周研磨";
    return "プラン";
  }

  function getPlanDescription(menuName) {
    const label = getPlanLabel(menuName);

    if (label === "研磨なし") return "新車や状態の良いお車におすすめ。";
    if (label === "軽研磨") return "軽い雨染みや小キズが気になるお車におすすめ。";
    if (label === "2周研磨") return "艶をしっかり出したい方におすすめ。";

    return "お車の状態に合わせて施工いたします。";
  }

  function toKatakana(str) {
    return str.replace(/[ぁ-ん]/g, char =>
      String.fromCharCode(char.charCodeAt(0) + 0x60)
    );
  }

  function toHalfWidth(str) {
    return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, char =>
      String.fromCharCode(char.charCodeAt(0) - 0xFEE0)
    );
  }

  function normalizeText(str) {
    return toHalfWidth(toKatakana(String(str)))
      .toLowerCase()
      .replace(/[・\s　\-\_\.\/／]/g, "")
      .replace(/[（）\(\)]/g, "");
  }

  function getAliasWords(car) {
    const words = [];

    if (car.maker === "メルセデス・ベンツ") {
      words.push("ベンツ","benz","mercedes","mercedesbenz","mb");
    }

    if (car.maker === "フォルクスワーゲン") {
      words.push("vw","volkswagen","ワーゲン");
    }

    if (car.maker === "レクサス") words.push("lexus");
    if (car.maker === "トヨタ") words.push("toyota");
    if (car.maker === "ホンダ") words.push("honda");
    if (car.maker === "日産") words.push("nissan");
    if (car.maker === "マツダ") words.push("mazda");
    if (car.maker === "スバル") words.push("subaru");
    if (car.maker === "スズキ") words.push("suzuki");
    if (car.maker === "ダイハツ") words.push("daihatsu");
    if (car.maker === "三菱") words.push("mitsubishi");
    if (car.maker === "テスラ") words.push("tesla");
    if (car.maker === "ポルシェ") words.push("porsche");
    if (car.maker === "アウディ") words.push("audi");
    if (car.maker === "ボルボ") words.push("volvo");
    if (car.maker === "ジープ") words.push("jeep");
    if (car.maker === "ランドローバー") words.push("landrover","rangerover");

    if (car.model === "プリウス") words.push("prius");
    if (car.model === "アルファード") words.push("alphard","アル");
    if (car.model === "ヴェルファイア") words.push("vellfire");
    if (car.model === "ハイエース") words.push("hiace");
    if (car.model === "ランドクルーザー250" || car.model === "ランドクルーザー300") {
      words.push("ランクル","landcruiser");
    }

    return words;
  }

  function getSearchText(car) {
    return normalizeText([
      car.maker,
      car.model,
      `${car.maker}${car.model}`,
      ...getAliasWords(car)
    ].join(" "));
  }

  function getSearchScore(car, keyword) {
    const maker = normalizeText(car.maker);
    const model = normalizeText(car.model);
    const makerModel = normalizeText(`${car.maker}${car.model}`);
    const searchText = getSearchText(car);

    if (model === keyword) return 100;
    if (makerModel === keyword) return 95;
    if (model.startsWith(keyword)) return 90;
    if (makerModel.startsWith(keyword)) return 85;
    if (maker.startsWith(keyword)) return 80;
    if (searchText.includes(keyword)) return 60;

    return 0;
  }

  function getMakerSortIndex(maker) {
    if (JAPANESE_MAKERS.includes(maker)) return JAPANESE_MAKERS.indexOf(maker);
    if (IMPORT_MAKERS.includes(maker)) return 100 + IMPORT_MAKERS.indexOf(maker);
    return 999;
  }

  function addMakerOptions() {
    const makers = [...new Set(cars.map(car => car.maker))]
      .sort((a,b) => {
        const diff = getMakerSortIndex(a) - getMakerSortIndex(b);
        if (diff !== 0) return diff;
        return a.localeCompare(b,"ja");
      });

    makerSelect.innerHTML = '<option value="">メーカーを選択</option>';

    const japaneseGroup = document.createElement("optgroup");
    japaneseGroup.label = "日本車";

    const importGroup = document.createElement("optgroup");
    importGroup.label = "輸入車";

    const otherGroup = document.createElement("optgroup");
    otherGroup.label = "その他";

    makers.forEach(maker => {
      const option = document.createElement("option");
      option.value = maker;
      option.textContent = maker;

      if (JAPANESE_MAKERS.includes(maker)) {
        japaneseGroup.appendChild(option);
      } else if (IMPORT_MAKERS.includes(maker)) {
        importGroup.appendChild(option);
      } else {
        otherGroup.appendChild(option);
      }
    });

    makerSelect.appendChild(japaneseGroup);
    makerSelect.appendChild(importGroup);

    if (otherGroup.children.length) {
      makerSelect.appendChild(otherGroup);
    }
  }

  addMakerOptions();

  function populateCarsByMaker(maker) {
    select.innerHTML = '<option value="">車種を選択</option>';

    cars
      .filter(car => car.maker === maker)
      .sort((a,b) => a.model.localeCompare(b.model,"ja"))
      .forEach(car => {
        const option = document.createElement("option");
        option.value = car.model;
        option.textContent = car.model;
        option.dataset.size = car.size;
        option.dataset.maker = car.maker;
        select.appendChild(option);
      });
  }

  document.querySelectorAll(".quick-car-button").forEach(button => {
    button.addEventListener("click", function() {

        item.maker === this.dataset.maker &&
        item.model === this.dataset.model

    populateCarsByMaker(this.value);
    result.innerHTML = "";
    carSearch.value = "";
    searchResults.innerHTML = "";
    searchResults.style.display = "none";
  });

  select.addEventListener("change", function() {
    const option = this.selectedOptions[0];

    if (!option.value) {
      result.innerHTML = "";
      return;
    }

    const car = cars.find(item =>
      item.maker === option.dataset.maker &&
      item.model === option.value
    );

    if (car) showCar(car);
  });

  carSearch.addEventListener("input", function() {
    const rawKeyword = this.value.trim();
    const keyword = normalizeText(rawKeyword);

    searchResults.innerHTML = "";

    if (!keyword) {
      searchResults.style.display = "none";
      return;
    }

    const keywords = rawKeyword
      .split(/\s+/)
      .map(word => normalizeText(word))
      .filter(Boolean);

    const effectiveKeywords = keywords.length ? keywords : [keyword];

    const matchedCars = cars
      .map(car => {
        const searchText = getSearchText(car);

        const isMatch =
          effectiveKeywords.every(word => searchText.includes(word)) ||
          searchText.includes(keyword);

        if (!isMatch) return null;

        const score = Math.max(
          getSearchScore(car, keyword),
          ...effectiveKeywords.map(word => getSearchScore(car, word))
        );

        return { car, score };
      })
      .filter(Boolean)
      .sort((a,b) => {
        if (b.score !== a.score) return b.score - a.score;
        return `${a.car.maker}${a.car.model}`.localeCompare(`${b.car.maker}${b.car.model}`,"ja");
      })
      .slice(0,20)
      .map(item => item.car);

    if (!matchedCars.length) {
      searchResults.innerHTML =
        '<div class="search-result-item">該当する車種がありません</div>';
      searchResults.style.display = "block";
      return;
    }

    matchedCars.forEach(car => {
      const item = document.createElement("div");
      item.className = "search-result-item";
      item.textContent = `${car.maker} ${car.model}／${car.size}サイズ`;
      item.addEventListener("click", function() {
        showCar(car);
      });
      searchResults.appendChild(item);
    });

    searchResults.style.display = "block";
  });

  async function loadMenus(size) {

    const coatingArea = document.getElementById("coatingArea");

    const { data: menus } = await supabase
      .from("menus")
      .select("*");

    const { data: sizePrices } = await supabase
      .from("prices")
      .select("*")
      .eq("size", size);

    menus.sort((a,b) => {
      const order = {
        "純水手洗い洗車":1,
        "徹底洗車":2,
        "徹底洗車ライト":3,
        "MIYABI+ISM（研磨なし）":4,
        "MIYABI+ISM（軽研磨）":5,
        "MIYABI+ISM（2層研磨）":6,
        "MIYABI+IZM（研磨なし）":7,
        "MIYABI+IZM（軽研磨）":8,
        "MIYABI+IZM（2層研磨）":9,
        "MIYABI+OVER COAT（研磨なし）":10,
        "MIYABI+OVER COAT（軽研磨）":11,
        "MIYABI+OVER COAT（2層研磨）":12
      };

      return (order[a.menu_name] || 999) - (order[b.menu_name] || 999);
    });

    categorySelect.addEventListener("change", function() {
      menuSelect.innerHTML = '<option value="">メニューを選択</option>';
      coatingArea.innerHTML = "";
      coatingArea.style.display = "none";
      washMenuArea.style.display = "none";
      document.getElementById("optionArea").innerHTML = "";
      document.getElementById("priceResult").innerHTML = "";
      currentQuoteState = null;

      const selectedCategory = this.value;
      const filteredMenus = menus.filter(menu => menu.category === selectedCategory);

      if (selectedCategory === "wash") {
        washMenuArea.style.display = "block";

        filteredMenus.forEach(menu => {
          const option = document.createElement("option");
          option.value = menu.menu_name;
          option.textContent = formatMenuName(menu.menu_name);

        return;
      }

オプション追加時間：
${optionTimeCopyText}

この内容で問い合わせ希望です。`;
      }

      document.querySelectorAll(".optionCheck").forEach(check => {
        check.addEventListener("change", function() {
          updateTotal();
          resetReservationSelection();
        });
      });

      document
        .getElementById("lineContactBtn")
        .addEventListener("click", async function() {
          const copyMessage = document.getElementById("copyMessage");

          try {
            await navigator.clipboard.writeText(currentEstimateText);
            copyMessage.textContent =
              "お見積り内容をコピーしました。LINEで貼り付けて送信してください。";
          } catch (error) {
            copyMessage.textContent =
              "コピーできませんでした。手動でコピーしてください。";
          }

          window.open(lineUrl, "_blank", "noopener");
        });

      document
        .getElementById("copyEstimateBtn")
        .addEventListener("click", async function() {
          const copyMessage = document.getElementById("copyMessage");

          try {
            await navigator.clipboard.writeText(currentEstimateText);
            copyMessage.textContent =
              "お見積り内容をコピーしました。LINEで貼り付けて送信できます。";
          } catch (error) {
            copyMessage.textContent =
              "コピーできませんでした。画面のお見積り内容を選択してコピーしてください。";
          }
        });

      updateTotal();
      renderReservationArea(selectedMenu);
    }
  }

  function resetReservationSelection() {
    const form = document.getElementById("reservationForm");
    const message = document.getElementById("reservationMessage");
    const selectedDate = document.getElementById("reservationSelectedDate");
    const timeSlotArea = document.getElementById("timeSlotArea");

    if (form) form.remove();
    if (message) message.textContent = "";
    if (selectedDate) selectedDate.textContent = "";
    if (timeSlotArea) timeSlotArea.innerHTML = "";
  }

  function isClosedDay(dateString) {
    const date = new Date(dateString + "T00:00:00");
    const day = date.getDay();
    return day === 1 || day === 2;
  }

  function isPastDate(dateString) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const date = new Date(dateString + "T00:00:00");
    return date < today;
  }

  function formatDateString(date) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function addBusinessDays(startDateString, workDays) {
    const dates = [];
    const date = new Date(startDateString + "T00:00:00");

    while (dates.length < workDays) {
      const dateString = formatDateString(date);

      if (!isClosedDay(dateString)) {
        dates.push(dateString);
      }

      date.setDate(date.getDate() + 1);
    }

    return dates;
  }

  function timeToMinutes(timeString) {
    const [hour, minute] = String(timeString).slice(0,5).split(":").map(Number);
    return hour * 60 + minute;
  }

  function hourToTime(hour) {
    return `${String(hour).padStart(2,"0")}:00`;
  }

  function addHours(timeString, hours) {
    const minutes = timeToMinutes(timeString) + hours * 60;
    const hour = Math.floor(minutes / 60);
    const minute = minutes % 60;
    return `${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")}`;
  }

  function isTimeOverlap(startA, endA, startB, endB) {
    return timeToMinutes(startA) < timeToMinutes(endB) &&
      timeToMinutes(endA) > timeToMinutes(startB);
  }

  async function isMainDateAvailable(startDate, menuData) {
    if (isClosedDay(startDate)) {
      return {
        ok:false,
        message:"月曜・火曜は定休日のため選択できません。"
      };
    }

    if (isPastDate(startDate)) {
      return {
        ok:false,
        message:"過去の日付は選択できません。"
      };
    }

    const workDays = Number(menuData.work_days || 1);
    const blockDates = addBusinessDays(startDate, workDays);
    const endDate = blockDates[blockDates.length - 1];

    const { data: reservations, error } = await supabase
      .from("reservations")
      .select("*")
      .eq("booking_lane", "main")
      .lte("start_date", endDate)
      .gte("end_date", startDate);

    if (error) {
      console.error(error);
      return {
        ok:false,
        message:"予約状況の確認中にエラーが発生しました。"
      };
    }

    if (reservations && reservations.length > 0) {
      return {
        ok:false,
        message:"この開始日はコーティング予約が重なるため選択できません。"
      };
    }

    return {
      ok:true,
      endDate,
      blockDates
    };
  }

  async function getAvailableWashSlots(dateString, menuData) {
    if (isClosedDay(dateString)) {
      return [];
    }

    if (isPastDate(dateString)) {
      return [];
    }

    const dailyLimit = Number(menuData.daily_limit || 2);

    const { data: reservations, error } = await supabase
      .from("reservations")
      .select("*")
      .eq("start_date", dateString)
      .eq("booking_lane", "sub");

    if (error) {
      console.error(error);
      return [];
    }

    const timedReservations = (reservations || []).filter(reservation =>
      reservation.start_time && reservation.end_time
    );

    if (timedReservations.length >= dailyLimit) {
      return [];
    }

    return WASH_START_HOURS.map(hour => {
      const startTime = hourToTime(hour);
      const endTime = addHours(startTime, WASH_DURATION_HOURS);

      const overlap = timedReservations.some(reservation => {
        if (!reservation.start_time || !reservation.end_time) return false;
        return isTimeOverlap(
          startTime,
          endTime,
          String(reservation.start_time).slice(0,5),
          String(reservation.end_time).slice(0,5)
        );
      });

      return {
        startTime,
        endTime,
        available:!overlap
      };
    });
  }

  async function renderReservationArea(menuData) {
    const priceResult = document.getElementById("priceResult");
    const oldReservation = document.getElementById("reservationArea");
    if (oldReservation) oldReservation.remove();

    const bookingLane = menuData.booking_lane || "main";
    const isWashTimeBooking = bookingLane === "sub";

    priceResult.insertAdjacentHTML(
      "beforeend",
      `
        <div id="reservationArea" class="reservation-card">
          <div class="estimate-title">オンライン予約</div>
          <p class="contact-subnote">
            ${isWashTimeBooking
              ? "純水手洗い洗車は、日付と開始時間をお選びください。月曜・火曜は定休日です。"
              : "コーティングは施工開始日のみお選びください。月曜・火曜は定休日です。"}
          </p>

          <div class="reservation-calendar-head">
            <button id="prevMonthBtn" class="calendar-nav-button" type="button">前月</button>
            <div id="calendarMonthTitle" class="calendar-month-title"></div>
            <button id="nextMonthBtn" class="calendar-nav-button" type="button">次月</button>
          </div>

          <div class="calendar-legend">
            <span class="legend-open-text">空きあり</span>
            <span class="legend-few-text">残りわずか</span>
            <span class="legend-full-text">満枠</span>
            <span class="legend-closed-text">定休日</span>
          </div>

          <div id="reservationCalendar" class="calendar-grid"></div>
          <div id="reservationSelectedDate" class="reservation-selected-date"></div>
          <div id="timeSlotArea" class="time-slot-area"></div>
          <div id="reservationMessage" class="copy-message"></div>
        </div>
      `
    );

    const today = new Date();
    let calendarYear = today.getFullYear();
    let calendarMonth = today.getMonth();

    document.getElementById("prevMonthBtn").addEventListener("click", function() {
      const now = new Date();
      const prevLimit = new Date(now.getFullYear(), now.getMonth(), 1);
      const nextMonth = new Date(calendarYear, calendarMonth - 1, 1);

      if (nextMonth < prevLimit) return;

      calendarYear = nextMonth.getFullYear();
      calendarMonth = nextMonth.getMonth();
      renderCalendar();
    });

    document.getElementById("nextMonthBtn").addEventListener("click", function() {
      const nextMonth = new Date(calendarYear, calendarMonth + 1, 1);
      calendarYear = nextMonth.getFullYear();
      calendarMonth = nextMonth.getMonth();
      renderCalendar();
    });

    async function renderCalendar() {
      resetReservationSelection();

      const calendar = document.getElementById("reservationCalendar");
      const title = document.getElementById("calendarMonthTitle");
      const firstDate = new Date(calendarYear, calendarMonth, 1);
      const lastDate = new Date(calendarYear, calendarMonth + 1, 0);
      const weekdays = ["日","月","火","水","木","金","土"];

      title.textContent = `${calendarYear}年${calendarMonth + 1}月`;
      calendar.innerHTML = "";

      weekdays.forEach(day => {
        const weekday = document.createElement("div");
        weekday.className = "calendar-weekday";
        weekday.textContent = day;
        calendar.appendChild(weekday);
      });

      for (let i = 0; i < firstDate.getDay(); i++) {
        const empty = document.createElement("button");
        empty.type = "button";
        empty.className = "calendar-day empty";
        empty.disabled = true;
        calendar.appendChild(empty);
      }

      const dayButtons = [];

      for (let day = 1; day <= lastDate.getDate(); day++) {
        const date = new Date(calendarYear, calendarMonth, day);
        const dateString = formatDateString(date);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "calendar-day";
        button.dataset.date = dateString;
        button.innerHTML = `
          <span class="calendar-day-number">${day}</span>
          <span class="calendar-day-status">確認中</span>
        `;

        const statusLabel = button.querySelector(".calendar-day-status");

        if (isClosedDay(dateString)) {
          button.classList.add("closed");
          button.disabled = true;
          button.title = "定休日";
          statusLabel.textContent = "定休日";
        } else if (isPastDate(dateString)) {
          button.classList.add("past");
          button.disabled = true;
          statusLabel.textContent = "－";
        } else {
          button.disabled = true;
          dayButtons.push({ button, statusLabel, dateString });
        }

        button.addEventListener("click", async function() {
          document.querySelectorAll(".calendar-day").forEach(dayButton => {
            dayButton.classList.remove("selected");
          });

          this.classList.add("selected");
          await handleDateSelected(dateString, menuData);
        });

        calendar.appendChild(button);
      }

      await Promise.all(dayButtons.map(async item => {
        const { button, statusLabel, dateString } = item;
        const bookingLane = menuData.booking_lane || "main";

        if (bookingLane === "sub") {
          const slots = await getAvailableWashSlots(dateString, menuData);
          const availableCount = slots.filter(slot => slot.available).length;

          if (availableCount <= 0) {
            button.classList.add("unavailable");
            button.disabled = true;
            statusLabel.textContent = "満枠";
            return;
          }

          button.classList.add(availableCount <= 1 ? "few" : "available");
          button.disabled = false;
          statusLabel.textContent = availableCount <= 1
            ? "残りわずか"
            : "空きあり";
          return;
        }

        const available = await isMainDateAvailable(dateString, menuData);

        if (!available.ok) {
          button.classList.add("unavailable");
          button.disabled = true;
          statusLabel.textContent = "満枠";
          return;
        }

        button.classList.add("available");
        button.disabled = false;
        statusLabel.textContent = "空きあり";
      }));
    }

    await renderCalendar();
  }

  async function handleDateSelected(dateString, menuData) {
    const bookingLane = menuData.booking_lane || "main";
    const selectedDate = document.getElementById("reservationSelectedDate");
    const timeSlotArea = document.getElementById("timeSlotArea");
    const message = document.getElementById("reservationMessage");

    resetReservationSelection();
    selectedDate.textContent = `選択日：${dateString}`;

    if (bookingLane === "sub") {
      message.textContent = "空き時間を確認しています。";

      const slots = await getAvailableWashSlots(dateString, menuData);
      message.textContent = "";

      if (!slots.length || !slots.some(slot => slot.available)) {
        message.textContent = "この日は純水手洗い洗車の空き枠がありません。";
        return;
      }

      timeSlotArea.innerHTML = `
        <div class="result-label">開始時間を選択</div>
        <div class="time-slot-grid"></div>
      `;

      const grid = timeSlotArea.querySelector(".time-slot-grid");

      slots.forEach(slot => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "time-slot-button";
        button.textContent = `${slot.startTime}〜${slot.endTime}`;
        button.disabled = !slot.available;

        button.addEventListener("click", function() {
          document.querySelectorAll(".time-slot-button").forEach(slotButton => {
            slotButton.classList.remove("active");
          });

          this.classList.add("active");
          message.textContent = "この時間で仮予約できます。";

          showReservationForm({
            startDate:dateString,
            endDate:dateString,
            startTime:slot.startTime,
            endTime:slot.endTime,
            menuData
          });
        });

        grid.appendChild(button);
      });

      return;
    }

    message.textContent = "空き状況を確認しています。";
    const available = await isMainDateAvailable(dateString, menuData);

    if (!available.ok) {
      message.textContent = available.message;
      return;
    }

    message.textContent = `この日程は仮予約可能です。施工終了予定日：${available.endDate}`;

    showReservationForm({
      startDate:dateString,
      endDate:available.endDate,
      startTime:null,
      endTime:null,
      menuData
    });
  }

  function showReservationForm({ startDate, endDate, startTime, endTime, menuData }) {
    const oldForm = document.getElementById("reservationForm");
    if (oldForm) oldForm.remove();

    const reservationArea = document.getElementById("reservationArea");
    const timeText = startTime && endTime
      ? `<div class="contact-subnote">予約時間：${startTime}〜${endTime}</div>`
      : "";

    reservationArea.insertAdjacentHTML(
      "beforeend",
      `
        <div id="reservationForm" class="reservation-form">
          ${timeText}

          <input
            id="customerName"
            type="text"
            placeholder="お名前"
          >

          <input
            id="customerPhone"
            type="tel"
            placeholder="電話番号"
          >

          <textarea
            id="customerNote"
            placeholder="ご要望・備考（任意）"
          ></textarea>

          <button
            id="saveReservationBtn"
            class="line-button"
            type="button"
          >
            仮予約する
          </button>

          <div
            id="reservationSaveMessage"
            class="copy-message"
          ></div>
        </div>
      `
    );

    document
      .getElementById("saveReservationBtn")
      .addEventListener("click", () => saveReservation({
        startDate,
        endDate,
        startTime,
        endTime,
        menuData
      }));
  }

  async function saveReservation({ startDate, endDate, startTime, endTime, menuData }) {
    const customerName = document.getElementById("customerName").value.trim();
    const customerPhone = document.getElementById("customerPhone").value.trim();
    const customerNote = document.getElementById("customerNote").value.trim();
    const saveMessage = document.getElementById("reservationSaveMessage");
    const saveButton = document.getElementById("saveReservationBtn");

    if (!customerName) {
      saveMessage.textContent = "お名前を入力してください。";
      return;
    }

    if (!customerPhone) {
      saveMessage.textContent = "電話番号を入力してください。";
      return;
    }

    saveButton.disabled = true;
    saveMessage.textContent = "予約状況を再確認しています。";

    const bookingLane = menuData.booking_lane || "main";

    if (bookingLane === "sub") {
      const slots = await getAvailableWashSlots(startDate, menuData);
      const targetSlot = slots.find(slot =>
        slot.startTime === startTime &&
        slot.endTime === endTime &&
        slot.available
      );

      if (!targetSlot) {
        saveButton.disabled = false;
        saveMessage.textContent = "この時間は先に予約が入ったため選択できません。別の時間をお選びください。";
        return;
      }
    } else {
      const available = await isMainDateAvailable(startDate, menuData);
      if (!available.ok) {
        saveButton.disabled = false;
        saveMessage.textContent = available.message;
        return;
      }
    }

    const selectedOptions = [];
    document.querySelectorAll(".optionCheck:checked").forEach(check => {
      selectedOptions.push(check.dataset.name);
    });

    const totalPrice = currentQuoteState ? currentQuoteState.totalPrice : Number(
      document.getElementById("totalPrice").textContent.replace(/[^\d]/g, "")
    );

    const selectedSize = currentQuoteState ? currentQuoteState.selectedSize : currentSelectedCar.size;
    const selectedMenuName = currentQuoteState ? currentQuoteState.menuName : menuData.menu_name;

    const { error } = await supabase
      .from("reservations")
      .insert([
        {
          customer_name:customerName,
          phone:customerPhone,
          maker:currentSelectedCar.maker,
          model:currentSelectedCar.model,
          size:selectedSize,
          menu_name:selectedMenuName,
          options:selectedOptions.join(" / "),
          total_price:totalPrice,
          work_time:menuData.work_time,
          work_days:Number(menuData.work_days || 1),
          start_date:startDate,
          end_date:endDate,
          start_time:startTime,
          end_time:endTime,
          status:"仮予約",
          booking_lane:bookingLane,
          daily_limit:Number(menuData.daily_limit || 1)
        }
      ]);

    if (error) {
      console.error(error);
      saveButton.disabled = false;
      saveMessage.textContent = "保存に失敗しました。Supabaseの列名・RLS設定を確認してください。";
      return;
    }

    const reservationText = startTime && endTime
      ? `予約希望：${startDate} ${startTime}〜${endTime}`
      : `施工開始日：${startDate}\n施工終了予定日：${endDate}`;

    const reservationCopyText =
`RACY'SPEED 仮予約内容

お名前：${customerName}
電話番号：${customerPhone}

お車：${currentSelectedCar.maker} ${currentSelectedCar.model}
サイズ：${selectedSize}サイズ

施工メニュー：
${formatMenuName(selectedMenuName)}

選択オプション：
${selectedOptions.length ? selectedOptions.map(name => `・${name}`).join("\n") : "なし"}

お支払い総額：
${totalPrice.toLocaleString()}円（税込）

${reservationText}

備考：
${customerNote || "なし"}`;

    saveMessage.innerHTML = `
      仮予約を受付しました。<br>
      ※この時点ではまだ予約確定ではありません。LINEで内容を送信してください。
    `;

    const existingLineButton = document.getElementById("reservationLineBtn");
    if (existingLineButton) existingLineButton.remove();

    saveMessage.insertAdjacentHTML(
      "afterend",
      `
        <button id="reservationLineBtn" class="line-button" type="button">
          仮予約内容をコピーしてLINEを開く
        </button>
      `
    );

    document.getElementById("reservationLineBtn").addEventListener("click", async function() {
      try {
        await navigator.clipboard.writeText(reservationCopyText);
      } catch (error) {
        console.error(error);
      }
      window.open(lineUrl, "_blank", "noopener");
    });
  }
}
