<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RACY'SPEED 管理画面</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Shippori Mincho','Yu Mincho','YuMincho','Hiragino Mincho ProN','HGS明朝E',serif !important;
  padding:24px;
}

.admin-wrap{
  max-width:1100px;
  margin:auto;
}

.shop-name{
  text-align:center;
  letter-spacing:.25em;
  font-size:18px;
  margin-bottom:8px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:28px;
}

.dashboard-card{
  border:1px solid #fff;
  padding:18px;
  text-align:center;
}

.dashboard-label{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

.dashboard-value{
  font-size:28px;
  font-weight:bold;
}

.dashboard-yen{
  font-size:24px;
}

.admin-calendar{
  border:1px solid #fff;
  padding:18px;
  margin-bottom:28px;
}

.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.calendar-title{
  font-size:20px;
  font-weight:bold;
  letter-spacing:.08em;
}

.calendar-nav{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:8px 14px;
  cursor:pointer;
}

.calendar-nav:hover{
  background:#fff;
  color:#000;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-weekday{
  text-align:center;
  color:#aaa;
  font-size:12px;
  padding:8px 0;
  border-bottom:1px solid #333;
}

.calendar-day{
  min-height:90px;
  border:1px solid #333;
  padding:8px;
  cursor:pointer;
  background:#000;
}

.calendar-day:hover{
  border-color:#fff;
}

.calendar-day.empty{
  border:none;
  cursor:default;
}

.calendar-day-number{
  font-size:14px;
  margin-bottom:6px;
}

.calendar-day.has-reservation{
  border-color:#fff;
}

.calendar-count{
  display:inline-block;
  margin-top:4px;
  padding:3px 6px;
  border:1px solid #8dff8d;
  color:#8dff8d;
  font-size:11px;
}

.calendar-menu{
  margin-top:5px;
  font-size:11px;
  color:#ddd;
  line-height:1.4;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.tab-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.tab-btn.active{
  background:#fff;
  color:#000;
}

.reservation-card{
  border:1px solid #fff;
  padding:20px;
  margin-bottom:16px;
}

.reservation-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.status{
  padding:5px 10px;
  border:1px solid #fff;
}

.pending{
  color:#ffd966;
  border-color:#ffd966;
}

.confirmed{
  color:#8dff8d;
  border-color:#8dff8d;
}

.rejected{
  color:#ff6b6b;
  border-color:#ff6b6b;
}

.info{
  line-height:1.9;
}

.actions{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.action-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.action-btn:hover{
  background:#fff;
  color:#000;
}

.empty{
  border:1px solid #fff;
  padding:30px;
  text-align:center;
}

.section-title{
  margin:0 0 16px;
  font-size:18px;
  letter-spacing:.08em;
}

.line-ok{
  color:#8dff8d;
}

.line-ng{
  color:#aaa;
}

@media(max-width:800px){
  .dashboard{
    grid-template-columns:repeat(2,1fr);
  }

  .calendar-day{
    min-height:72px;
    padding:6px;
  }

  .calendar-menu{
    display:none;
  }
}

@media(max-width:520px){
  body{
    padding:16px;
  }

  .dashboard{
    grid-template-columns:1fr;
  }

  .dashboard-value{
    font-size:24px;
  }

  .admin-calendar{
    padding:12px;
  }

  .calendar-title{
    font-size:16px;
  }

  .calendar-grid{
    gap:3px;
  }

  .calendar-day{
    min-height:58px;
    padding:4px;
  }

  .calendar-day-number{
    font-size:12px;
  }

  .calendar-count{
    font-size:10px;
    padding:2px 4px;
  }
}


.login-screen{
  max-width:420px;
  margin:80px auto;
  border:1px solid #fff;
  padding:28px;
  text-align:center;
}

.login-screen input{
  width:100%;
  padding:12px;
  margin:16px 0;
  background:#000;
  color:#fff;
  border:1px solid #fff;
  box-sizing:border-box;
}

.login-screen button{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 18px;
  cursor:pointer;
}

.login-screen button:hover{
  background:#fff;
  color:#000;
}

.login-error{
  color:#ff6b6b;
  margin-top:12px;
}

async function loadDashboard(){

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*");

 if(error){
   console.error(error);
   pendingCount.textContent = "-";
   confirmedCount.textContent = "-";
   rejectedCount.textContent = "-";
   monthSales.textContent = "-";
   return;
 }

 const reservations = data || [];

 const pending =
 reservations.filter(r => r.status === "仮予約").length;

 const confirmed =
 reservations.filter(r => r.status === "予約確定").length;

 const rejected =
 reservations.filter(r => r.status === "却下").length;

 const today = new Date();
 const year = today.getFullYear();
 const month = String(today.getMonth() + 1).padStart(2,"0");
 const monthPrefix = `${year}-${month}`;

 const sales =
 reservations
 .filter(r =>
   r.status === "予約確定" &&
   String(r.start_date || "").startsWith(monthPrefix)
 )
 .reduce((sum,r) => {
   return sum + Number(r.total_price || 0);
 },0);

 pendingCount.textContent = pending;
 confirmedCount.textContent = confirmed;
 rejectedCount.textContent = rejected;
 monthSales.textContent =
 sales.toLocaleString() + "円";

}

async function loadAdminCalendar(){

 calendarGrid.innerHTML = "";

 const year = calendarDate.getFullYear();
 const month = calendarDate.getMonth();

 calendarTitle.textContent =
 `${year}年${month + 1}月`;

 const monthStart =
 `${year}-${String(month + 1).padStart(2,"0")}-01`;

 const lastDay =
 new Date(year, month + 1, 0).getDate();

 const monthEnd =
 `${year}-${String(month + 1).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`;

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*")
 .eq("status","予約確定")
 .lte("start_date",monthEnd)
 .gte("end_date",monthStart)
 .order("start_date",{ascending:true})
 .order("start_time",{ascending:true});

 if(error){
   console.error(error);
   calendarGrid.innerHTML =
   `<div class="empty">カレンダー取得に失敗しました</div>`;
   return;
 }

 const confirmedReservations = data || [];

 const weekdays = ["日","月","火","水","木","金","土"];

 weekdays.forEach(day=>{
   const div = document.createElement("div");
   div.className = "calendar-weekday";
   div.textContent = day;
   calendarGrid.appendChild(div);
 });

 const firstWeekday =
 new Date(year, month, 1).getDay();

 for(let i=0;i<firstWeekday;i++){
   const empty = document.createElement("div");
   empty.className = "calendar-day empty";
   calendarGrid.appendChild(empty);
 }

 for(let day=1; day<=lastDay; day++){

   const dateText =
   `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

   const dayReservations =
   confirmedReservations.filter(r =>
     r.start_date <= dateText &&
     r.end_date >= dateText
   );

   const div = document.createElement("div");
   div.className =
   "calendar-day" +
   (dayReservations.length ? " has-reservation" : "");

   div.innerHTML =
   `<div class="calendar-day-number">${day}</div>`;

   if(dayReservations.length){
     div.innerHTML +=
     `<div class="calendar-count">${dayReservations.length}件</div>`;

     dayReservations.slice(0,2).forEach(r=>{
       div.innerHTML +=
       `<div class="calendar-menu">
          ${escapeHtml(r.menu_name || "")}
        </div>`;
     });
   }

   div.addEventListener("click",()=>{
     showReservationsByDate(dateText);
   });

   calendarGrid.appendChild(div);
 }

}

function renderFollowupCard(customer, f){

 const today = new Date();
 today.setHours(0,0,0,0);

 const followDate = new Date(f.follow_date + "T00:00:00");
 const diffMs = followDate.getTime() - today.getTime();
 const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

 let badgeText = "";
 let badgeClass = "ok";
 let cardClass = "";

 if(f.status === "送信済み"){
   badgeText = "送信済み";
   badgeClass = "ok";
 }else if(diffDays < 0){
   badgeText = `${Math.abs(diffDays)}日過ぎています`;
   badgeClass = "over";
   cardClass = "overdue";
 }else if(diffDays === 0){
   badgeText = "今日が案内日";
   badgeClass = "warn";
   cardClass = "due-soon";
 }else if(diffDays <= 14){
   badgeText = `あと${diffDays}日`;
   badgeClass = "warn";
   cardClass = "due-soon";
 }else{
   badgeText = `あと${diffDays}日`;
   badgeClass = "ok";
 }

 const message =
 buildFollowupLineMessage(customer, f);

 return `
 <div class="followup-card ${cardClass}">

   <div class="followup-head">
     <div class="followup-title">
       ${escapeHtml(f.follow_title || "-")}
     </div>

     <div class="followup-badge ${badgeClass}">
       ${escapeHtml(badgeText)}
     </div>
   </div>

   <div class="followup-info">
     <div>案内予定日：${escapeHtml(f.follow_date || "-")}</div>
     <div>状態：${escapeHtml(f.status || "未対応")}</div>
     <div>種類：${escapeHtml(f.follow_type || "-")}</div>
   </div>

   <div class="followup-message-box">${escapeHtml(message)}</div>

   <div class="actions">
     <button
       class="action-btn"
       onclick="copyFollowupMessage('${f.id}')">
       LINE文面コピー
     </button>

     <button
       class="action-btn"
       onclick="markFollowupSent('${f.id}')">
       送信済みにする
     </button>
   </div>

 </div>
 `;

}

function buildFollowupLineMessage(customer, followup){

 const customerName =
 customer.customer_name || "お客様";

 const title =
 followup.follow_title || "メンテナンスのご案内";

 const message =
 followup.follow_message ||
 "お車のメンテナンス時期となりました。";

 return `RACY'SPEEDです。

${customerName}様

${message}

おすすめ内容：
${title}

ご都合の良いタイミングでご予約ください。

ご予約・お問い合わせはこちら
https://www.racyspeed.com/`;

}

async function copyFollowupMessage(followupId){

 const {data:followup,error:followupError} =
 await supabaseClient
 .from("customer_followups")
 .select("*")
 .eq("id",followupId)
 .single();

 if(followupError || !followup){
   console.error(followupError);
   alert("フォロー情報の取得に失敗しました");
   return;
 }

 const {data:customer,error:customerError} =
 await supabaseClient
 .from("customers")
 .select("*")
 .eq("id",followup.customer_id)
 .single();

 if(customerError || !customer){
   console.error(customerError);
   alert("顧客情報の取得に失敗しました");
   return;
 }

 const message =
 buildFollowupLineMessage(customer, followup);

 try{
   await navigator.clipboard.writeText(message);
   alert("LINE文面をコピーしました");
 }catch(error){
   console.error(error);
   alert(message);
 }

}

async function markFollowupSent(followupId){

 if(!confirm("このフォローを送信済みにしますか？")){
   return;
 }

 const {data,error} =
 await supabaseClient
 .from("customer_followups")
 .update({
   status:"送信済み",
   line_sent_at:new Date().toISOString()
 })
 .eq("id",followupId)
 .select("*")
 .single();

 if(error){
   console.error(error);
   alert("更新に失敗しました");
   return;
 }

 alert("送信済みにしました");

 if(data && data.customer_id){
   loadCustomerDetail(data.customer_id);
 }

}

 prompt("メーカーを入力してください\n例：LEXUS");

 const model =

 if(model === null){

function normalizeDateInput(value){

 const text =
 String(value || "").trim();

 if(!text){
   return null;
 }

 const hyphenDatePattern =
 new RegExp("^\\d{4}-\\d{2}-\\d{2}$");

 const slashDatePattern =
 new RegExp("^\\d{4}/\\d{1,2}/\\d{1,2}$");

 if(hyphenDatePattern.test(text)){
   return text;
 }

 if(slashDatePattern.test(text)){
   const parts = text.split("/");
   return (
     parts[0] + "-" +
     String(parts[1]).padStart(2,"0") + "-" +
     String(parts[2]).padStart(2,"0")
   );
 }

 return null;

}

function normalizeTimeInput(value){

 const text =
 String(value || "").trim();

 if(!text){
   return null;
 }

 const timePattern =
 new RegExp("^\\d{1,2}:\\d{2}$");

 if(timePattern.test(text)){
   const parts = text.split(":");
   return String(parts[0]).padStart(2,"0") + ":" + parts[1];
 }

 return null;

}

 }

 rows.length;

 rows.reduce((sum,r) => {
   return sum + Number(r.total_price || 0);
 },0);

 const dates =
 rows
 .map(r => r.start_date)
 .filter(Boolean)
 .sort();

 dates.length ? dates[0] : null;

 dates.length ? dates[dates.length - 1] : null;

 await supabaseClient
 .from("customers")
 .update({
   total_visit_count:totalVisitCount,
   total_spent:totalSpent,
   first_visit_date:firstVisitDate,
   last_visit_date:lastVisitDate
 })
 .eq("phone",phone);

}

async function loadCrmDashboard(){

 listTitle.textContent = "経営ダッシュボード";

 reservationList.innerHTML =
 `<div class="empty">ダッシュボードを読み込み中...</div>`;

 const today = new Date();
 today.setHours(0,0,0,0);

 const todayText =
 formatDateForQuery(today);

 const monthPrefix =
 `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2,"0")}`;

 const {data:reservations,error:reservationError} =
 await supabaseClient
 .from("reservations")
 .select("*");

 if(reservationError){
   console.error(reservationError);
   reservationList.innerHTML =
   `<div class="empty">予約データの取得に失敗しました</div>`;
   return;
 }

 const {data:customers,error:customerError} =
 await supabaseClient
 .from("customers")
 .select("*");

 if(customerError){
   console.error(customerError);
 }

 const {data:followups,error:followupError} =
 await supabaseClient
 .from("customer_followups")
 .select(`
   *,
   customers (
     id,
     customer_name,
     phone
   ),
   customer_cars (
     maker,
     model,
     size
   )
 `)
 .order("follow_date",{ascending:true});

 if(followupError){
   console.error(followupError);
 }

 const allReservations =
 reservations || [];

 const allCustomers =
 customers || [];

 const allFollowups =
 followups || [];

 const confirmedReservations =
 allReservations.filter(r => r.status === "予約確定");

 const todayReservations =
 confirmedReservations
 .filter(r =>
   String(r.start_date || "") <= todayText &&
   String(r.end_date || r.start_date || "") >= todayText
 )
 .sort((a,b) => String(a.start_time || "").localeCompare(String(b.start_time || "")));

 const todayFollowups =
 allFollowups
 .filter(f => {
   if((f.status || "未対応") === "送信済み"){
     return false;
   }

   const followDate =
   new Date(String(f.follow_date || "") + "T00:00:00");

   if(Number.isNaN(followDate.getTime())){
     return false;
   }

   return followDate.getTime() <= today.getTime();
 })
 .sort((a,b) => String(a.follow_date || "").localeCompare(String(b.follow_date || "")));

 const monthConfirmed =
 confirmedReservations.filter(r =>
   String(r.start_date || "").startsWith(monthPrefix)
 );

 const monthSales =
 monthConfirmed.reduce((sum,r) => {
   return sum + Number(r.total_price || 0);
 },0);

 const newCustomersThisMonth =
 allCustomers.filter(c =>
   String(c.first_visit_date || "").startsWith(monthPrefix)
 ).length;

 const repeatCustomersThisMonthPhones =
 new Set(
   monthConfirmed
   .filter(r => {
     const customer =
     allCustomers.find(c => c.phone === r.phone);

     return customer && Number(customer.total_visit_count || 0) >= 2;
   })
   .map(r => r.phone)
   .filter(Boolean)
 );

 const repeatCustomersThisMonth =
 repeatCustomersThisMonthPhones.size;

 const uniqueCustomerPhonesThisMonth =
 new Set(
   monthConfirmed
   .map(r => r.phone)
   .filter(Boolean)
 ).size;

 const repeatRate =
 uniqueCustomerPhonesThisMonth
 ? Math.round((repeatCustomersThisMonth / uniqueCustomerPhonesThisMonth) * 1000) / 10
 : 0;

 renderCrmDashboard({
   todayReservations,
   todayFollowups,
   monthSales,
   monthConfirmedCount:monthConfirmed.length,
   newCustomersThisMonth,
   repeatCustomersThisMonth,
   repeatRate
 });

}

function getFilteredFollowups(followups, filterType){

 const today = new Date();
 today.setHours(0,0,0,0);

 return (followups || []).filter(f => {

   const status = f.status || "未対応";

   if(filterType === "done"){
     return status === "送信済み";
   }

   if(status === "送信済み"){
     return false;
   }

   if(filterType === "all"){
     return true;
   }

   const followDate =
   new Date(String(f.follow_date || "") + "T00:00:00");

   if(Number.isNaN(followDate.getTime())){
     return false;
   }

   const diffDays =
   Math.ceil((followDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

   if(filterType === "today"){
     return diffDays <= 0;
   }

   if(filterType === "week"){
     return diffDays <= 7;
   }

   if(filterType === "month"){
     return diffDays <= 30;
   }

   return true;

 });

}

function getFollowupDaysInfo(f){

 if((f.status || "") === "送信済み"){
   return {
     text:"送信済み",
     className:"done"
   };
 }

 const today = new Date();
 today.setHours(0,0,0,0);

 const followDate =
 new Date(String(f.follow_date || "") + "T00:00:00");

 if(Number.isNaN(followDate.getTime())){
   return {
     text:"日付未設定",
     className:""
   };
 }

 const diffDays =
 Math.ceil((followDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

 if(diffDays < 0){
   return {
     text:`${Math.abs(diffDays)}日過ぎています`,
     className:"over"
   };
 }

 if(diffDays === 0){
   return {
     text:"今日",
     className:"today"
   };
 }

 return {
   text:`あと${diffDays}日`,
   className:""
 };

}

async function updateStatus(id,status){

 const {data:beforeData,error:beforeError} =
 await supabaseClient
 .from("reservations")
 .select("*")
 .eq("id",id)
 .single();

 if(beforeError || !beforeData){
   console.error(beforeError);
   alert("予約情報の取得に失敗しました");
   return;
 }

 const beforeStatus = beforeData.status || "仮予約";
 let rejectReason = "";

 if(status === "却下"){

   const confirmMessage =
   beforeStatus === "予約確定"
   ? `この確定済み予約を却下しますか？\n\nGoogleカレンダーの予定も自動削除します。`
   : `この予約を却下しますか？`;

   if(!confirm(confirmMessage)){
     return;
   }

   rejectReason = prompt(
`却下理由を入力してください

例
満枠のため
営業時間外のため
施工期間確保不可
その他`
   );

   if(rejectReason === null){
     return;
   }

 }else{

   if(!confirm(status + "に変更しますか？")){
     return;
   }

 }

 let calendarDeleteResult = "skip";
 const messages = [];

 if(status === "却下" && beforeStatus === "予約確定"){
   calendarDeleteResult = await deleteGoogleCalendarEvent(beforeData);

   if(calendarDeleteResult === "deleted"){
     messages.push("Googleカレンダーの予定を削除しました");
   }else if(calendarDeleteResult === "not_found"){
     messages.push("Googleカレンダーに削除対象の予定は見つかりませんでした");
   }else{
     messages.push("Googleカレンダー予定削除に失敗しました");
   }
 }

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .update({
   status:status,
   reject_reason:rejectReason || null
 })
 .eq("id",id)
 .select("*")
 .single();

 if(error){
   console.error(error);
   alert("更新失敗");
   return;
 }

 messages.push("更新完了");

 if(status === "予約確定"){

   const calendarResult = await createGoogleCalendarEvent(data);

   if(calendarResult === "created"){
     messages.push("Googleカレンダーに登録しました");
   }else{
     messages.push("Googleカレンダー登録に失敗しました");
   }

 }

 if(status === "予約確定" || status === "却下"){

   const notifyResult = await sendCustomerLineNotification(data);

   if(notifyResult === "sent"){
     if(status === "予約確定"){
       messages.push("お客様へ予約確定LINEを送信しました");
     }else{
       messages.push("お客様へ却下LINEを送信しました");
     }
   }

   if(notifyResult === "no_line"){
     messages.push("この予約はLINE通知不可です");
   }

   if(notifyResult === "failed"){
     messages.push("お客様LINE通知に失敗しました");
   }

 }

 alert(messages.join("\n"));

 await loadDashboard();
 await loadAdminCalendar();
 await loadReservations();

}
async function createGoogleCalendarEvent(reservation){

 try{

   const res =
   await fetch(
     "https://klfijtvnbgdkqcslntsp.supabase.co/functions/v1/create-google-calendar-event",
     {
       method:"POST",
       headers:{
         "Content-Type":"application/json"
       },
       body:JSON.stringify(reservation)
     }
   );

   const result =
   await res.json();

   console.log("Googleカレンダー登録結果", result);

   if(result && result.ok){
     return "created";
   }

   return "failed";

 }catch(error){

   console.error("Googleカレンダー登録エラー", error);
   return "failed";

 }

}
async function deleteGoogleCalendarEvent(reservation){

 try{

   console.log("Googleカレンダー削除リクエスト", reservation);

   const res = await fetch(
     "https://klfijtvnbgdkqcslntsp.supabase.co/functions/v1/delete-google-calendar-event",
     {
       method:"POST",
       headers:{
         "Content-Type":"application/json",
         "apikey":SUPABASE_ANON_KEY,
         "Authorization":`Bearer ${SUPABASE_ANON_KEY}`
       },
       body:JSON.stringify(reservation)
     }
   );

   const rawText = await res.text();
   let result = null;

   try{
     result = rawText ? JSON.parse(rawText) : null;
   }catch(parseError){
     console.error("Googleカレンダー削除JSON変換エラー", parseError, rawText);
     return "failed";
   }

   console.log("Googleカレンダー削除HTTP", res.status, rawText);
   console.log("Googleカレンダー削除結果", result);

   if(!res.ok){
     return "failed";
   }

   if(result && result.ok && result.deleted){
     return "deleted";
   }

   if(result && result.ok && !result.deleted){
     return "not_found";
   }

   return "failed";

 }catch(error){

   console.error("Googleカレンダー削除エラー", error);
   return "failed";

 }

}
async function sendCustomerLineNotification(reservation){

 if(!reservation || !reservation.customer_line_user_id){
   return "no_line";
 }

 try{

   const res =
   await fetch(
     "https://klfijtvnbgdkqcslntsp.supabase.co/functions/v1/send-customer-line",
     {
       method:"POST",
       headers:{
         "Content-Type":"application/json"
       },
       body:JSON.stringify(reservation)
     }
   );

   if(!res.ok){
     console.error("お客様LINE通知失敗", await res.text());
     return "failed";
   }

   return "sent";

 }catch(error){

   console.error("お客様LINE通知エラー", error);
   return "failed";

 }

}

function formatPrice(price){

 if(!price){
   return "-";
 }

 return Number(price)
 .toLocaleString()
 +"円";

}

function escapeHtml(text){

 return String(text ?? "")
 .replaceAll("&","&amp;")
 .replaceAll("<","&lt;")
 .replaceAll(">","&gt;")
 .replaceAll('"',"&quot;")
 .replaceAll("'","&#039;");

}
