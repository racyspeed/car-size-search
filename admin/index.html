<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RACY'SPEED 管理画面</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,Meiryo,sans-serif;
  padding:24px;
}

.admin-wrap{
  max-width:1100px;
  margin:auto;
}

.shop-name{
  text-align:center;
  letter-spacing:.25em;
  font-size:18px;
  margin-bottom:8px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:28px;
}

.dashboard-card{
  border:1px solid #fff;
  padding:18px;
  text-align:center;
}

.dashboard-label{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

.dashboard-value{
  font-size:28px;
  font-weight:bold;
}

.dashboard-yen{
  font-size:24px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.tab-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.tab-btn.active{
  background:#fff;
  color:#000;
}

.reservation-card{
  border:1px solid #fff;
  padding:20px;
  margin-bottom:16px;
}

.reservation-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.status{
  padding:5px 10px;
  border:1px solid #fff;
}

.pending{
  color:#ffd966;
  border-color:#ffd966;
}

.confirmed{
  color:#8dff8d;
  border-color:#8dff8d;
}

.rejected{
  color:#ff6b6b;
  border-color:#ff6b6b;
}

.info{
  line-height:1.9;
}

.actions{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.action-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.action-btn:hover{
  background:#fff;
  color:#000;
}

.empty{
  border:1px solid #fff;
  padding:30px;
  text-align:center;
}

@media(max-width:800px){
  .dashboard{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:520px){
  body{
    padding:16px;
  }

  .dashboard{
    grid-template-columns:1fr;
  }

  .dashboard-value{
    font-size:24px;
  }
}

</style>
</head>

<body>

<div class="admin-wrap">

<div class="shop-name">
RACY'SPEED
</div>

<h1>予約管理画面</h1>

<div class="dashboard">
  <div class="dashboard-card">
    <div class="dashboard-label">仮予約</div>
    <div class="dashboard-value" id="pendingCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">予約確定</div>
    <div class="dashboard-value" id="confirmedCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">却下</div>
    <div class="dashboard-value" id="rejectedCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">今月の確定売上</div>
    <div class="dashboard-value dashboard-yen" id="monthSales">-</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-status="仮予約">仮予約</button>
  <button class="tab-btn" data-status="予約確定">予約確定</button>
  <button class="tab-btn" data-status="却下">却下</button>
  <button class="tab-btn" data-status="all">すべて</button>
</div>

<div id="reservationList"></div>

</div>

<script>

const SUPABASE_URL =
"https://klfijtvnbgdkqcslntsp.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

const reservationList =
document.getElementById("reservationList");

const tabButtons =
document.querySelectorAll(".tab-btn");

const pendingCount =
document.getElementById("pendingCount");

const confirmedCount =
document.getElementById("confirmedCount");

const rejectedCount =
document.getElementById("rejectedCount");

const monthSales =
document.getElementById("monthSales");

let currentStatus = "仮予約";

async function loadDashboard(){

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*");

 if(error){
   console.error(error);
   pendingCount.textContent = "-";
   confirmedCount.textContent = "-";
   rejectedCount.textContent = "-";
   monthSales.textContent = "-";
   return;
 }

 const reservations = data || [];

 const pending =
 reservations.filter(r => r.status === "仮予約").length;

 const confirmed =
 reservations.filter(r => r.status === "予約確定").length;

 const rejected =
 reservations.filter(r => r.status === "却下").length;

 const today = new Date();
 const year = today.getFullYear();
 const month = String(today.getMonth() + 1).padStart(2,"0");
 const monthPrefix = `${year}-${month}`;

 const sales =
 reservations
 .filter(r =>
   r.status === "予約確定" &&
   String(r.start_date || "").startsWith(monthPrefix)
 )
 .reduce((sum,r) => {
   return sum + Number(r.total_price || 0);
 },0);

 pendingCount.textContent = pending;
 confirmedCount.textContent = confirmed;
 rejectedCount.textContent = rejected;
 monthSales.textContent =
 sales.toLocaleString() + "円";

}

async function loadReservations(){

 reservationList.innerHTML =
 `<div class="empty">読み込み中...</div>`;

 let query =
 supabaseClient
 .from("reservations")
 .select("*")
 .order("start_date",{ascending:true})
 .order("start_time",{ascending:true});

 if(currentStatus !== "all"){
   query =
   query.eq("status",currentStatus);
 }

 const {data,error} =
 await query;

 if(error){
   console.error(error);

   reservationList.innerHTML =
   `<div class="empty">
      予約一覧の取得に失敗しました
    </div>`;

   return;
 }

 renderReservations(data);

}

function renderReservations(reservations){

 if(!reservations || reservations.length===0){

   reservationList.innerHTML =
   `<div class="empty">
      該当する予約はありません
    </div>`;

   return;
 }

 reservationList.innerHTML =
 reservations.map(r=>{

   const statusClass =
   r.status === "予約確定"
   ? "confirmed"
   : r.status === "却下"
   ? "rejected"
   : "pending";

   return `

   <div class="reservation-card">

     <div class="reservation-head">

       <strong>
         ${escapeHtml(r.customer_name || "名前なし")}
       </strong>

       <span class="status ${statusClass}">
         ${escapeHtml(r.status || "仮予約")}
       </span>

     </div>

     <div class="info">

       <div>
         車種：
         ${escapeHtml(r.maker || "")}
         ${escapeHtml(r.model || "")}
       </div>

       <div>
         サイズ：
         ${escapeHtml(r.size || "-")}
       </div>

       <div>
         メニュー：
         ${escapeHtml(r.menu_name || "-")}
       </div>

       <div>
         オプション：
         ${escapeHtml(r.options || "なし")}
       </div>

       <div>
         電話：
         ${escapeHtml(r.phone || "-")}
       </div>

       <div>
         開始日：
         ${escapeHtml(r.start_date || "-")}
       </div>

       <div>
         終了日：
         ${escapeHtml(r.end_date || "-")}
       </div>

       <div>
         開始時間：
         ${escapeHtml(r.start_time || "-")}
       </div>

       <div>
         終了時間：
         ${escapeHtml(r.end_time || "-")}
       </div>

       <div>
         金額：
         ${formatPrice(r.total_price)}
       </div>

     </div>

     <div class="actions">

       ${
       r.status !== "予約確定"
       ?
       `<button
          class="action-btn"
          onclick="updateStatus(${r.id},'予約確定')">
          承認
        </button>`
       :
       ""
       }

       ${
       r.status !== "却下"
       ?
       `<button
          class="action-btn"
          onclick="updateStatus(${r.id},'却下')">
          却下
        </button>`
       :
       ""
       }

     </div>

   </div>

   `;

 }).join("");

}

async function updateStatus(id,status){

 if(!confirm(status+"に変更しますか？")){
   return;
 }

 const {error} =
 await supabaseClient
 .from("reservations")
 .update({
   status:status
 })
 .eq("id",id);

 if(error){
   console.error(error);
   alert("更新失敗");
   return;
 }

 alert("更新完了");

 await loadDashboard();
 await loadReservations();

}

function formatPrice(price){

 if(!price){
   return "-";
 }

 return Number(price)
 .toLocaleString()
 +"円";

}

function escapeHtml(text){

 return String(text ?? "")
 .replaceAll("&","&amp;")
 .replaceAll("<","&lt;")
 .replaceAll(">","&gt;")
 .replaceAll('"',"&quot;")
 .replaceAll("'","&#039;");

}

tabButtons.forEach(btn=>{

 btn.addEventListener("click",()=>{

   tabButtons.forEach(
   b=>b.classList.remove("active")
   );

   btn.classList.add("active");

   currentStatus =
   btn.dataset.status;

   loadReservations();

 });

});

loadDashboard();
loadReservations();

</script>

</body>
</html>
