<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RACY'SPEED 管理画面</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,Meiryo,sans-serif;
  padding:24px;
}

.admin-wrap{
  max-width:1100px;
  margin:auto;
}

.shop-name{
  text-align:center;
  letter-spacing:.25em;
  font-size:18px;
  margin-bottom:8px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:28px;
}

.dashboard-card{
  border:1px solid #fff;
  padding:18px;
  text-align:center;
}

.dashboard-label{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

.dashboard-value{
  font-size:28px;
  font-weight:bold;
}

.dashboard-yen{
  font-size:24px;
}

.admin-calendar{
  border:1px solid #fff;
  padding:18px;
  margin-bottom:28px;
}

.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.calendar-title{
  font-size:20px;
  font-weight:bold;
  letter-spacing:.08em;
}

.calendar-nav{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:8px 14px;
  cursor:pointer;
}

.calendar-nav:hover{
  background:#fff;
  color:#000;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-weekday{
  text-align:center;
  color:#aaa;
  font-size:12px;
  padding:8px 0;
  border-bottom:1px solid #333;
}

.calendar-day{
  min-height:90px;
  border:1px solid #333;
  padding:8px;
  cursor:pointer;
  background:#000;
}

.calendar-day:hover{
  border-color:#fff;
}

.calendar-day.empty{
  border:none;
  cursor:default;
}

.calendar-day-number{
  font-size:14px;
  margin-bottom:6px;
}

.calendar-day.has-reservation{
  border-color:#fff;
}

.calendar-count{
  display:inline-block;
  margin-top:4px;
  padding:3px 6px;
  border:1px solid #8dff8d;
  color:#8dff8d;
  font-size:11px;
}

.calendar-menu{
  margin-top:5px;
  font-size:11px;
  color:#ddd;
  line-height:1.4;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.tab-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.tab-btn.active{
  background:#fff;
  color:#000;
}

.reservation-card{
  border:1px solid #fff;
  padding:20px;
  margin-bottom:16px;
}

.reservation-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.status{
  padding:5px 10px;
  border:1px solid #fff;
}

.pending{
  color:#ffd966;
  border-color:#ffd966;
}

.confirmed{
  color:#8dff8d;
  border-color:#8dff8d;
}

.rejected{
  color:#ff6b6b;
  border-color:#ff6b6b;
}

.info{
  line-height:1.9;
}

.actions{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.action-btn{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  padding:10px 16px;
  cursor:pointer;
}

.action-btn:hover{
  background:#fff;
  color:#000;
}

.empty{
  border:1px solid #fff;
  padding:30px;
  text-align:center;
}

.section-title{
  margin:0 0 16px;
  font-size:18px;
  letter-spacing:.08em;
}

.line-ok{
  color:#8dff8d;
}

.line-ng{
  color:#aaa;
}

@media(max-width:800px){
  .dashboard{
    grid-template-columns:repeat(2,1fr);
  }

  .calendar-day{
    min-height:72px;
    padding:6px;
  }

  .calendar-menu{
    display:none;
  }
}

@media(max-width:520px){
  body{
    padding:16px;
  }

  .dashboard{
    grid-template-columns:1fr;
  }

  .dashboard-value{
    font-size:24px;
  }

  .admin-calendar{
    padding:12px;
  }

  .calendar-title{
    font-size:16px;
  }

  .calendar-grid{
    gap:3px;
  }

  .calendar-day{
    min-height:58px;
    padding:4px;
  }

  .calendar-day-number{
    font-size:12px;
  }

  .calendar-count{
    font-size:10px;
    padding:2px 4px;
  }
}

</style>
</head>

<body>

<div class="admin-wrap">

<div class="shop-name">
RACY'SPEED
</div>

<h1>予約管理画面</h1>

<div class="dashboard">
  <div class="dashboard-card">
    <div class="dashboard-label">仮予約</div>
    <div class="dashboard-value" id="pendingCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">予約確定</div>
    <div class="dashboard-value" id="confirmedCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">却下</div>
    <div class="dashboard-value" id="rejectedCount">-</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-label">今月の確定売上</div>
    <div class="dashboard-value dashboard-yen" id="monthSales">-</div>
  </div>
</div>

<div class="admin-calendar">
  <div class="calendar-head">
    <button class="calendar-nav" id="prevMonthBtn">前月</button>
    <div class="calendar-title" id="calendarTitle">-</div>
    <button class="calendar-nav" id="nextMonthBtn">翌月</button>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-status="仮予約">仮予約</button>
  <button class="tab-btn" data-status="予約確定">予約確定</button>
  <button class="tab-btn" data-status="却下">却下</button>
  <button class="tab-btn" data-status="all">すべて</button>
</div>

<h2 class="section-title" id="listTitle">予約一覧</h2>

<div id="reservationList"></div>

</div>

<script>

const SUPABASE_URL =
"https://klfijtvnbgdkqcslntsp.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_jm8kPE51RZJitnkw11orxA_au9j3f6Z";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

const reservationList =
document.getElementById("reservationList");

const tabButtons =
document.querySelectorAll(".tab-btn");

const pendingCount =
document.getElementById("pendingCount");

const confirmedCount =
document.getElementById("confirmedCount");

const rejectedCount =
document.getElementById("rejectedCount");

const monthSales =
document.getElementById("monthSales");

const calendarGrid =
document.getElementById("calendarGrid");

const calendarTitle =
document.getElementById("calendarTitle");

const listTitle =
document.getElementById("listTitle");

const prevMonthBtn =
document.getElementById("prevMonthBtn");

const nextMonthBtn =
document.getElementById("nextMonthBtn");

let currentStatus = "仮予約";
let calendarDate = new Date();

async function loadDashboard(){

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*");

 if(error){
   console.error(error);
   pendingCount.textContent = "-";
   confirmedCount.textContent = "-";
   rejectedCount.textContent = "-";
   monthSales.textContent = "-";
   return;
 }

 const reservations = data || [];

 const pending =
 reservations.filter(r => r.status === "仮予約").length;

 const confirmed =
 reservations.filter(r => r.status === "予約確定").length;

 const rejected =
 reservations.filter(r => r.status === "却下").length;

 const today = new Date();
 const year = today.getFullYear();
 const month = String(today.getMonth() + 1).padStart(2,"0");
 const monthPrefix = `${year}-${month}`;

 const sales =
 reservations
 .filter(r =>
   r.status === "予約確定" &&
   String(r.start_date || "").startsWith(monthPrefix)
 )
 .reduce((sum,r) => {
   return sum + Number(r.total_price || 0);
 },0);

 pendingCount.textContent = pending;
 confirmedCount.textContent = confirmed;
 rejectedCount.textContent = rejected;
 monthSales.textContent =
 sales.toLocaleString() + "円";

}

async function loadAdminCalendar(){

 calendarGrid.innerHTML = "";

 const year = calendarDate.getFullYear();
 const month = calendarDate.getMonth();

 calendarTitle.textContent =
 `${year}年${month + 1}月`;

 const monthStart =
 `${year}-${String(month + 1).padStart(2,"0")}-01`;

 const lastDay =
 new Date(year, month + 1, 0).getDate();

 const monthEnd =
 `${year}-${String(month + 1).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`;

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*")
 .eq("status","予約確定")
 .lte("start_date",monthEnd)
 .gte("end_date",monthStart)
 .order("start_date",{ascending:true})
 .order("start_time",{ascending:true});

 if(error){
   console.error(error);
   calendarGrid.innerHTML =
   `<div class="empty">カレンダー取得に失敗しました</div>`;
   return;
 }

 const confirmedReservations = data || [];

 const weekdays = ["日","月","火","水","木","金","土"];

 weekdays.forEach(day=>{
   const div = document.createElement("div");
   div.className = "calendar-weekday";
   div.textContent = day;
   calendarGrid.appendChild(div);
 });

 const firstWeekday =
 new Date(year, month, 1).getDay();

 for(let i=0;i<firstWeekday;i++){
   const empty = document.createElement("div");
   empty.className = "calendar-day empty";
   calendarGrid.appendChild(empty);
 }

 for(let day=1; day<=lastDay; day++){

   const dateText =
   `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

   const dayReservations =
   confirmedReservations.filter(r =>
     r.start_date <= dateText &&
     r.end_date >= dateText
   );

   const div = document.createElement("div");
   div.className =
   "calendar-day" +
   (dayReservations.length ? " has-reservation" : "");

   div.innerHTML =
   `<div class="calendar-day-number">${day}</div>`;

   if(dayReservations.length){
     div.innerHTML +=
     `<div class="calendar-count">${dayReservations.length}件</div>`;

     dayReservations.slice(0,2).forEach(r=>{
       div.innerHTML +=
       `<div class="calendar-menu">
          ${escapeHtml(r.menu_name || "")}
        </div>`;
     });
   }

   div.addEventListener("click",()=>{
     showReservationsByDate(dateText);
   });

   calendarGrid.appendChild(div);
 }

}

async function showReservationsByDate(dateText){

 listTitle.textContent =
 `${dateText} の予約確定一覧`;

 tabButtons.forEach(b=>b.classList.remove("active"));

 reservationList.innerHTML =
 `<div class="empty">読み込み中...</div>`;

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .select("*")
 .eq("status","予約確定")
 .lte("start_date",dateText)
 .gte("end_date",dateText)
 .order("start_time",{ascending:true});

 if(error){
   console.error(error);
   reservationList.innerHTML =
   `<div class="empty">予約取得に失敗しました</div>`;
   return;
 }

 renderReservations(data || []);

}

async function loadReservations(){

 listTitle.textContent = "予約一覧";

 reservationList.innerHTML =
 `<div class="empty">読み込み中...</div>`;

 let query =
 supabaseClient
 .from("reservations")
 .select("*")
 .order("start_date",{ascending:true})
 .order("start_time",{ascending:true});

 if(currentStatus !== "all"){
   query =
   query.eq("status",currentStatus);
 }

 const {data,error} =
 await query;

 if(error){
   console.error(error);

   reservationList.innerHTML =
   `<div class="empty">
      予約一覧の取得に失敗しました
    </div>`;

   return;
 }

 renderReservations(data);

}

function renderReservations(reservations){

 if(!reservations || reservations.length===0){

   reservationList.innerHTML =
   `<div class="empty">
      該当する予約はありません
    </div>`;

   return;
 }

 reservationList.innerHTML =
 reservations.map(r=>{

   const statusClass =
   r.status === "予約確定"
   ? "confirmed"
   : r.status === "却下"
   ? "rejected"
   : "pending";

   const lineStatus =
   r.customer_line_user_id
   ? `<span class="line-ok">LINE通知可</span>`
   : `<span class="line-ng">LINE通知不可</span>`;

   return `

   <div class="reservation-card">

     <div class="reservation-head">

       <strong>
         ${escapeHtml(r.customer_name || "名前なし")}
       </strong>

       <span class="status ${statusClass}">
         ${escapeHtml(r.status || "仮予約")}
       </span>

     </div>

     <div class="info">

       <div>
         車種：
         ${escapeHtml(r.maker || "")}
         ${escapeHtml(r.model || "")}
       </div>

       <div>
         サイズ：
         ${escapeHtml(r.size || "-")}
       </div>

       <div>
         メニュー：
         ${escapeHtml(r.menu_name || "-")}
       </div>

       <div>
         オプション：
         ${escapeHtml(r.options || "なし")}
       </div>

       <div>
         電話：
         ${escapeHtml(r.phone || "-")}
       </div>

       <div>
         開始日：
         ${escapeHtml(r.start_date || "-")}
       </div>

       <div>
         終了日：
         ${escapeHtml(r.end_date || "-")}
       </div>

       <div>
         開始時間：
         ${escapeHtml(r.start_time || "-")}
       </div>

       <div>
         終了時間：
         ${escapeHtml(r.end_time || "-")}
       </div>

       <div>
         金額：
         ${formatPrice(r.total_price)}
       </div>

       <div>
         予約経路：
         ${escapeHtml(r.reservation_source || "web")}
       </div>

       <div>
         お客様LINE：
         ${lineStatus}
       </div>

     </div>

     <div class="actions">

  ${
  r.status === "仮予約"
  ?
  `<button
     class="action-btn"
     onclick="updateStatus(${r.id},'予約確定')">
     承認
   </button>

   <button
     class="action-btn"
     onclick="updateStatus(${r.id},'却下')">
     却下
   </button>`
  :
  `<div style="color:#aaa;">
     処理済み
   </div>`
  }

</div>

   </div>

   `;

 }).join("");

}

async function updateStatus(id,status){

 if(!confirm(status+"に変更しますか？")){
   return;
 }

 const {data,error} =
 await supabaseClient
 .from("reservations")
 .update({
   status:status
 })
 .eq("id",id)
 .select("*")
 .single();

 if(error){
   console.error(error);
   alert("更新失敗");
   return;
 }

 let message = "更新完了";

 if(status === "予約確定" || status === "却下"){

   const notifyResult =
   await sendCustomerLineNotification(data);

   if(notifyResult === "sent"){
     if(status === "予約確定"){
       message += "\nお客様へ予約確定LINEを送信しました";
     }else{
       message += "\nお客様へ却下LINEを送信しました";
     }
   }

   if(notifyResult === "no_line"){
     message += "\nこの予約はLINE通知不可です";
   }

   if(notifyResult === "failed"){
     message += "\nお客様LINE通知に失敗しました";
   }

 }

 alert(message);

 await loadDashboard();
 await loadAdminCalendar();
 await loadReservations();

}

async function sendCustomerLineNotification(reservation){

 if(!reservation || !reservation.customer_line_user_id){
   return "no_line";
 }

 try{

   const res =
   await fetch(
     "https://klfijtvnbgdkqcslntsp.supabase.co/functions/v1/send-customer-line",
     {
       method:"POST",
       headers:{
         "Content-Type":"application/json"
       },
       body:JSON.stringify(reservation)
     }
   );

   if(!res.ok){
     console.error("お客様LINE通知失敗", await res.text());
     return "failed";
   }

   return "sent";

 }catch(error){

   console.error("お客様LINE通知エラー", error);
   return "failed";

 }

}

function formatPrice(price){

 if(!price){
   return "-";
 }

 return Number(price)
 .toLocaleString()
 +"円";

}

function escapeHtml(text){

 return String(text ?? "")
 .replaceAll("&","&amp;")
 .replaceAll("<","&lt;")
 .replaceAll(">","&gt;")
 .replaceAll('"',"&quot;")
 .replaceAll("'","&#039;");

}

tabButtons.forEach(btn=>{

 btn.addEventListener("click",()=>{

   tabButtons.forEach(
   b=>b.classList.remove("active")
   );

   btn.classList.add("active");

   currentStatus =
   btn.dataset.status;

   loadReservations();

 });

});

prevMonthBtn.addEventListener("click",()=>{
 calendarDate.setMonth(calendarDate.getMonth() - 1);
 loadAdminCalendar();
});

nextMonthBtn.addEventListener("click",()=>{
 calendarDate.setMonth(calendarDate.getMonth() + 1);
 loadAdminCalendar();
});

loadDashboard();
loadAdminCalendar();
loadReservations();

</script>

</body>
</html>
